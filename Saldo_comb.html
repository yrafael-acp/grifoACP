<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DE SALDOS - ACP</title>
    <style>
        :root {
            --acp-green: #007d32;
            --acp-light: #f1f5f9;
            --danger: #ef4444;
            --secondary: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--acp-light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background-color: var(--acp-green); color: white; text-transform: uppercase; font-size: 0.9em; }
        
        .header-logo { width: 150px; }
        .title-bg { background-color: var(--acp-green); color: white; font-size: 1.5rem; font-weight: bold; }
        
        input, select { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1rem; }
        .readonly-field { background-color: #eee; font-weight: bold; }
        .gasolina-label { background-color: red; color: white; font-weight: bold; }
        .petroleo-label { background-color: var(--acp-green); color: white; font-weight: bold; }
        
        .date-section { text-align: right; margin-bottom: 10px; font-weight: bold; }
        #fechaReporte { width: auto; font-family: inherit; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        
        .btn-guardar { 
            background-color: var(--acp-green); color: white; border: none; padding: 15px 20px; 
            border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; flex: 1;
        }
        .btn-descargar {
            background-color: var(--secondary); color: white; border: none; padding: 15px 20px; 
            border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; flex: 1;
        }
        .btn-guardar:hover { background-color: #005e26; }
        .btn-descargar:hover { background-color: #475569; }
        
        /* Estilo para que el botón se oculte durante la captura si fuera necesario */
        .no-export { display: none !important; }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <div class="date-section">
        FECHA: <input type="date" id="fechaReporte">
    </div>

    <table>
        <tr>
            <td rowspan="2" style="width: 20%;"><img src="logo.png" alt="ACP" class="header-logo"></td>
            <td class="title-bg">REPORTE DE SALDOS</td>
        </tr>
    </table>

    <table>
        <thead>
            <tr>
                <th style="width: 20%;">DNI</th>
                <th>NOMBRES Y APELLIDOS</th>
                <th style="width: 20%;">TURNO</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" id="dniInput" class="readonly-field" readonly placeholder="--------"></td>
                <td>
                    <select id="operarioSelect" onchange="vincularDNI()">
                        <option value="">-- Seleccione Operario --</option>
                        <option value="77103804">WILDER NEYRA PAICO</option>
                        <option value="76181486">LUIS ANGEL JUAREZ ELIAS</option>
                        <option value="74308732">CARLOS ORRILLO CRUZADO</option>
                        <option value="41892133">CRISTIAN GONZALES UCEDA</option>
                        <option value="76377901">ANGELO SALAZAR DEL AGUILA</option>
                        <option value="16454237">FELIPE FERNANDEZ TERRONES</option>
                    </select>
                </td>
                <td>
                    <select id="turnoSelect" onchange="guardarEnNube()">
                        <option value="DIA">DIA</option>
                        <option value="NOCHE">NOCHE</option>
                    </select>
                </td>
            </tr>
        </tbody>
    </table>

    <table>
        <thead>
            <tr>
                <th>TIPO COMBUSTIBLE</th>
                <th>VARILLA FINAL</th>
                <th>SALDO FINAL</th>
                <th>ISOTANQUES</th>
                <th>TOTAL GALONES</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="gasolina-label">GASOLINA</td>
                <td><input type="number" id="vGasolina" step="0.1" value="0.0" oninput="calcularTotales()"></td>
                <td id="sGasolina" class="readonly-field">0.00</td>
                <td><input type="number" id="iGasolina" class="readonly-field" readonly step="0.01" value="0.00"></td>
                <td id="tGasolina" style="font-weight: bold;">0.00</td>
            </tr>
            <tr>
                <td class="petroleo-label">PETROLEO</td>
                <td><input type="number" id="vPetroleo" step="0.1" value="0.0" oninput="calcularTotales()"></td>
                <td id="sPetroleo" class="readonly-field">0.00</td>
                <td><input type="number" id="iPetroleo" class="readonly-field" readonly step="0.01" value="0.00"></td>
                <td id="tPetroleo" style="font-weight: bold;">0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="button-group">
        <button class="btn-guardar" onclick="enviarReporteFinal()">ENVIAR REPORTE FINAL</button>
        <button id="btnImg" class="btn-descargar" onclick="descargarComoImagen()">DESCARGAR COMO IMAGEN</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwIIm2kt01jwia7nlpxB6LPFnmp3iigJ4SaGC-QVYfCFLRYWcG7uTLJrx3zYV1xhWYh6Q/exec";

    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const resFecha = await fetch(`${scriptUrl}?action=getUltimaFecha`);
            const dataFecha = await resFecha.json();
            if (dataFecha.fecha) document.getElementById('fechaReporte').value = dataFecha.fecha;

            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            if (dataSist.reservas) {
                document.getElementById('iGasolina').value = dataSist.reservas.gasohol || 0;
                document.getElementById('iPetroleo').value = dataSist.reservas.diesel || 0;
            }

            const resBorrador = await fetch(`${scriptUrl}?action=getEstadoBorrador`);
            const borrador = await resBorrador.json();
            if (borrador) {
                document.getElementById('vGasolina').value = borrador.vGas;
                document.getElementById('vPetroleo').value = borrador.vPet;
                document.getElementById('operarioSelect').value = borrador.operario;
                document.getElementById('turnoSelect').value = borrador.turno;
                vincularDNI();
            }

            calcularTotales();
        } catch (e) { console.error("Error inicializando:", e); }
    });

    async function guardarEnNube() {
        const datos = {
            action: 'guardarEstadoBorrador',
            vGas: document.getElementById('vGasolina').value,
            vPet: document.getElementById('vPetroleo').value,
            operario: document.getElementById('operarioSelect').value,
            turno: document.getElementById('turnoSelect').value
        };
        await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
    }

    function vincularDNI() {
        const select = document.getElementById('operarioSelect');
        document.getElementById('dniInput').value = select.value;
        guardarEnNube();
    }

    async function calcularTotales() {
        const vGas = document.getElementById('vGasolina').value;
        const vPet = document.getElementById('vPetroleo').value;
        guardarEnNube();
        actualizarSaldoCombustible('GASOLINA', vGas, 'sGasolina', 'iGasolina', 'tGasolina');
        actualizarSaldoCombustible('PETROLEO', vPet, 'sPetroleo', 'iPetroleo', 'tPetroleo');
    }

    async function actualizarSaldoCombustible(tipo, valorVarilla, idSaldo, idIso, idTotal) {
        if (parseFloat(valorVarilla) >= 0) {
            try {
                const response = await fetch(`${scriptUrl}?action=getSaldoVarilla&tipo=${tipo}&valor=${valorVarilla}`);
                const data = await response.json();
                if (data.saldo !== undefined) {
                    const saldoFinal = parseFloat(data.saldo);
                    document.getElementById(idSaldo).innerText = saldoFinal.toFixed(2);
                    const iso = parseFloat(document.getElementById(idIso).value) || 0;
                    document.getElementById(idTotal).innerText = (saldoFinal + iso).toFixed(2);
                }
            } catch (e) { console.error(`Error en ${tipo}:`, e); }
        }
    }

    async function enviarReporteFinal() {
        if (!document.getElementById('operarioSelect').value) {
            alert("Por favor seleccione un operario");
            return;
        }

        const data = {
            action: 'saveReporteSaldos',
            fecha: document.getElementById('fechaReporte').value,
            dni: document.getElementById('dniInput').value,
            operario: document.getElementById('operarioSelect').options[document.getElementById('operarioSelect').selectedIndex].text,
            turno: document.getElementById('turnoSelect').value,
            gasVarilla: document.getElementById('vGasolina').value,
            gasSaldo: document.getElementById('sGasolina').innerText,
            gasIso: document.getElementById('iGasolina').value,
            gasTotal: document.getElementById('tGasolina').innerText,
            petVarilla: document.getElementById('vPetroleo').value,
            petSaldo: document.getElementById('sPetroleo').innerText,
            petIso: document.getElementById('iPetroleo').value,
            petTotal: document.getElementById('tPetroleo').innerText
        };

        const btn = document.querySelector('.btn-guardar');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Reporte guardado con éxito.");
        } catch (e) {
            alert("Error al guardar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR REPORTE FINAL";
        }
    }

    // --- NUEVA FUNCIÓN DE EXPORTACIÓN ---
    function descargarComoImagen() {
        const area = document.getElementById('captureArea');
        const btnGrupo = document.querySelector('.button-group');
        const btnImg = document.getElementById('btnImg');

        // 1. Ocultamos los botones temporalmente para que no salgan en la foto
        btnGrupo.style.visibility = 'hidden';
        btnImg.innerText = "GENERANDO...";

        html2canvas(area, {
            scale: 2, // Mejora la calidad de la imagen
            useCORS: true, // Permite cargar el logo si viene de URL externa
            backgroundColor: "#f1f5f9" // Color de fondo del reporte
        }).then(canvas => {
            const link = document.createElement('a');
            const fecha = document.getElementById('fechaReporte').value || 'reporte';
            link.download = `Saldo_ACP_${fecha}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            // 2. Restauramos los botones
            btnGrupo.style.visibility = 'visible';
            btnImg.innerText = "DESCARGAR COMO IMAGEN";
        });
    }
</script>

</body>
</html>
