<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSUMO FLOTA - ACP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-acp { background-color: #007d32; }
        .table-container { max-height: 60vh; overflow-y: auto; }
        .group-row { background-color: #f0fdf4; }
        .font-mono-data { font-family: 'Courier New', Courier, monospace; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-acp text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-gas-pump text-2xl"></i>
                <h1 class="text-xl font-bold italic">CONTROL NUBE - FLOTA</h1>
            </div>
            <div class="flex items-center gap-2">
                <select id="selectorSemanas" onchange="cargarSemanaGuardada()" class="bg-green-900 text-white text-xs p-2 rounded border border-white/30 outline-none">
                    <option value="actual">-- SEMANA ACTUAL --</option>
                </select>

                <button onclick="sincronizarDesdeNube()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition shadow-lg">
                    <i class="fas fa-sync-alt mr-2"></i> SINCRONIZAR
                </button>

                <button onclick="abrirModalConfig()" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-lg font-bold text-sm transition shadow-lg">
                    <i class="fas fa-cog mr-2"></i> GESTIONAR FLOTA
                </button>

                <button onclick="guardarSemanaCloud()" class="bg-yellow-500 hover:bg-yellow-600 text-green-900 px-4 py-2 rounded-lg font-bold text-sm transition shadow-lg">
                    <i class="fas fa-save mr-2"></i> CERRAR SEMANA
                </button>

                <button onclick="document.getElementById('uploadExcel').click()" class="bg-white text-green-800 px-3 py-2 rounded-lg font-bold text-xs hover:bg-green-50 transition shadow-lg">
                    <i class="fas fa-upload"></i>
                </button>
                <input type="file" id="uploadExcel" accept=".xlsx, .xls" class="hidden" onchange="leerExcel(this)">
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto p-4">
        <div id="contenedorAlertas" class="mb-4 hidden"></div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600">
                <span class="text-xs font-bold text-gray-400">ASIGNADO</span>
                <p id="resumenAsignado" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500">
                <span class="text-xs font-bold text-gray-400">CONSUMIDO</span>
                <p id="resumenConsumido" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-600">
                <span class="text-xs font-bold text-gray-400">SALDO TOTAL</span>
                <p id="resumenSaldo" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-600">
                <span class="text-xs font-bold text-gray-400">EFICIENCIA</span>
                <p id="resumenEficiencia" class="text-2xl font-black">0%</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg border overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <div class="relative w-96">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar placa o responsable..." class="pl-10 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div id="indicadorCarga" class="hidden text-green-600 font-bold animate-pulse text-sm">
                    <i class="fas fa-sync fa-spin mr-2"></i> Procesando...
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-left text-xs border-collapse" id="tablaFlota">
                    <thead class="bg-gray-800 text-white sticky top-0 z-10">
                        <tr>
                            <th class="p-3 border-r border-gray-700">PLACA</th>
                            <th class="p-3 border-r border-gray-700">RESPONSABLE / ÁREA</th>
                            <th class="p-3 text-center bg-blue-900">L</th><th class="p-3 text-center bg-blue-900">M</th>
                            <th class="p-3 text-center bg-blue-900">M</th><th class="p-3 text-center bg-blue-900">J</th>
                            <th class="p-3 text-center bg-blue-900">V</th><th class="p-3 text-center bg-blue-900">S</th>
                            <th class="p-3 text-center bg-blue-900">D</th>
                            <th class="p-3 text-center border-l border-gray-700 bg-gray-700">ASIG.</th>
                            <th class="p-3 text-center bg-orange-700">CONS.</th>
                            <th class="p-3 text-center bg-green-700">SALDO</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalConfig" class="modal flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-[800px] max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-4 bg-gray-800 text-white flex justify-between items-center">
                <h2 class="font-bold text-lg">Configuración de Flota y Asignaciones</h2>
                <button onclick="cerrarModalConfig()" class="text-2xl">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto flex-1">
                <div class="grid grid-cols-4 gap-2 mb-4 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <input type="text" id="newPlacas" placeholder="Placas (ej: PL-1, PL-2)" class="p-2 border rounded text-sm uppercase">
                    <input type="text" id="newResp" placeholder="Responsable" class="p-2 border rounded text-sm uppercase">
                    <input type="text" id="newArea" placeholder="Área" class="p-2 border rounded text-sm uppercase">
                    <input type="number" id="newAsig" placeholder="Gln Asignado" class="p-2 border rounded text-sm">
                    <button onclick="agregarFlotaManual()" class="col-span-4 bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">+ AGREGAR A LA LISTA</button>
                </div>
                <table class="w-full text-sm">
                    <thead><tr class="border-b text-gray-400 text-left"><th>PLACAS</th><th>RESPONSABLE</th><th>ÁREA</th><th>ASIG</th><th></th></tr></thead>
                    <tbody id="listaConfigFlota"></tbody>
                </table>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end">
                <button onclick="cerrarModalConfig()" class="bg-gray-800 text-white px-6 py-2 rounded font-bold">CERRAR Y APLICAR</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwxbsOPKzgjO5ERY4R40Vo84fo7PZtDg3DJMc5dwxIQua6SsHrrHFt0uvCF8jEOO0wdLA/exec';
        
        // --- ESTRUCTURA ACTUALIZADA SEGÚN IMÁGENES ---
        let ESTRUCTURA_FLOTA = JSON.parse(localStorage.getItem('config_flota_acp')) || [
            { p: ["BRI090"], r: "WENDY CHILCON", area: "CERRO LA PATA", a: 15.00 },
            { p: ["BRI612"], r: "LUIS MACHER", area: "MANTENIMIENTO FUNDO", a: 15.00 },
            { p: ["BRI635"], r: "JAVIER CALLIRGOS", area: "ARANDANO", a: 15.00 },
            { p: ["AZO588"], r: "KARINA VASQUEZ", area: "SEGURIDAD INDUSTRIAL", a: 15.00 },
            { p: ["AZO431"], r: "GISEL TIXE", area: "ARANDANO", a: 15.00 },
            { p: ["M6K436"], r: "PLANILLAS", area: "PLANILLAS", a: 12.00 },
            { p: ["CCM367"], r: "T.I GASOHOL", area: "T.I GASOHOL", a: 35.00 },
            { p: ["BYN781"], r: "LILIANA CHAFLOC", area: "CALIDAD PACKING", a: 25.00 },
            { p: ["BYN705"], r: "OSCAR HERNANDEZ", area: "SANIDAD", a: 35.00 },

            { p: ["BYM949"], r: "LUIS REAÑO", area: "RECLUTAMIENTO", a: 48.00 },
            { p: ["BXM905"], r: "MANUEL MARENGO", area: "TRANSPORTE", a: 48.00 },
            { p: ["BYM944"], r: "LUIS REAÑO", area: "RECLUTAMIENTO", a: 53.00 },
            { p: ["BZT777"], r: "LUIS REAÑO", area: "RECLUTAMIENTO", a: 38.00 },
            { p: ["BYN730"], r: "VICTOR YEMHENG", area: "ARANDANO", a: 25.00 },
            { p: ["BYN729"], r: "LUIS QUIROZ", area: "PROYECCION AGRICOLA", a: 25.00 },
            { p: ["BYN731"], r: "EDUARDO DIAZ", area: "SERVICIOS GENERALES", a: 25.00 },
            { p: ["CDR941"], r: "ABRAHAM ZAPATA", area: "PROYECTO SAP", a: 30.00 },

            { p: ["VCG910"], r: "LUIS REAÑO", area: "RECLUTAMIENTO", a: 30.00 },

            { p: ["BUN746"], r: "JENIFER AGURTO", area: "PROYECTOS", a: 30.00 },
            { p: ["BUO942"], r: "ARTURO CERRUTTI", area: "ALMACEN", a: 30.00 },
            { p: ["BXN705"], r: "ROLI PALMA", area: "ICP", a: 30.00 },
            { p: ["BUO749"], r: "ROLI PALMA", area: "ICP", a: 30.00 },
            { p: ["BUO792"], r: "JAVIER PASAPERA", area: "RIEGO", a: 30.00 },
            { p: ["BUO808"], r: "RONALD RUIZ", area: "ICP", a: 30.00 },
            { p: ["BRG897"], r: "MANUEL MARENGO", area: "FLOTA - RETEN (seg. pat. provisional)", a: 50.00 },
            { p: ["CDR887"], r: "JULIO YIANCCE", area: "APICULTURA", a: 30.00 },
            { p: ["BRI725"], r: "JULIO YIANCCE", area: "FLOTA - RETEN", a: 50.00 },
            { p: ["CKW496"], r: "MANUEL MARENGO", area: "FLOTA", a: 30.00 },
            { p: ["BWV868"], r: "ALBERTO CIEZA", area: "SEGURIDAD PATRIMONIAL", a: 25.00 },
            { p: ["BUD924"], r: "YENNI ROJAS", area: "ARANDANO", a: 30.00 },
            { p: ["BUF786", "BSH717"], r: "MANUEL MARENGO", area: "TRANSPORTE", a: 35.00, shared: true },
            { p: ["BUF836"], r: "MANUEL MARENGO", area: "TRANSPORTE", a: 35.00 },
            { p: ["CTH457"], r: "MANUEL MARENGO", area: "TRANSPORTE", a: 40.00 },
            { p: ["BUE757"], r: "HARRY BERNAOLA", area: "ESPARRAGO", a: 30.00 },
            { p: ["BUE802"], r: "JOSE MANRIQUE", area: "PALTO", a: 25.00 },
            { p: ["BRS810", "CHJ914"], r: "LUIS MACHER", area: "MANTENIMIENTO FUNDO", a: 30.00, shared: true },
            { p: ["CEU722"], r: "KARINA VASQUEZ", area: "SALUD OCUPACIONAL", a: 47.00 },
            { p: ["CEU820"], r: "LUIS MACHER", area: "MANTENIMIENTO FUNDO", a: 30.00 },
            { p: ["CDS745"], r: "KARINA VASQUEZ", area: "SEGURIDAD INDUSTRIAL", a: 30.00 },
            { p: ["EUG932"], r: "ISABEL SOTOMAYOR", area: "SALUD OCUPACIONAL", a: 50.00 },
            { p: ["EUJ542", "EUJ551", "EUI752"], r: "ISABEL SOTOMAYOR", area: "SALUD OCUPACIONAL", a: 50.00, shared: true },
            { p: ["EUC888"], r: "CRISTIAN TESEN (PLACA: BLO-928)", area: "MAQUINARIA", a: 20.00 },
            { p: ["H3K913"], r: "EDGARH SANTIESTEBAN", area: "AUDITORIA", a: 20.00 },
            { p: ["CLF333"], r: "ALFREDO CHAN WAY", area: "GERENCIA AGRICOLA", a: 42.00 },
            { p: ["CLF287", "BVD408"], r: "PERCY MUENTE", area: "GERENCIA GENERAL", a: 20.00, shared: true },
            { p: ["CLD318", "CPH672"], r: "CASE VIP (GASOHOL)", area: "CASE VIP", a: 36.00, shared: true },
            { p: ["CDL730", "CBA760"], r: "CASE VIP", area: "CASE VIP", a: 76.00, shared: true },
            { p: ["CDM720"], r: "CASE VIP", area: "CASE VIP", a: 50.00 },
            { p: ["C7Y818"], r: "RAFAEL PITA", area: "COMPRAS", a: 40.00 },
            { p: ["ACI748"], r: "OSCAR HERNANDEZ", area: "SANIDAD", a: 20.00 },
            { p: ["AUA855"], r: "CRISTIAN TESEN", area: "MAQUINARIA", a: 25.00 },
            { p: ["CFX846"], r: "PAMELA GOMEZ", area: "SOSTENIBILIDAD", a: 30.00 }
        ];

        let datosActuales = {};

        function renderTabla(datosConsumo = {}, estructuraUsar = ESTRUCTURA_FLOTA) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            let tA = 0, tC = 0;
            let alertas = [];

            estructuraUsar.forEach(grupo => {
                const totalGrupoConsumo = grupo.p.reduce((acc, pl) => acc + (datosConsumo[pl]?.total || 0), 0);
                const saldoGrupo = grupo.a - totalGrupoConsumo;

                if(saldoGrupo < 2) alertas.push({resp: grupo.r, saldo: saldoGrupo, placa: grupo.p[0]});

                grupo.p.forEach((placa, index) => {
                    const diario = datosConsumo[placa] || {L:0,M:0,Mi:0,J:0,V:0,S:0,D:0, total:0};
                    const mostrarAsig = index === 0;
                    if(mostrarAsig) { tA += grupo.a; tC += totalGrupoConsumo; }

                    cuerpo.innerHTML += `
                        <tr class="${grupo.shared ? 'group-row' : ''} hover:bg-yellow-50 text-[11px]">
                            <td class="p-2 font-bold border-r border-gray-200 text-blue-800">${placa}</td>
                            <td class="p-2 border-r border-gray-200">
                                <span class="font-semibold block">${grupo.r}</span>
                                <span class="text-[9px] text-gray-400 uppercase">${grupo.area}</span>
                            </td>
                            <td class="p-1 text-center text-gray-500">${diario.L || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.M || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.Mi || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.J || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.V || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.S || '-'}</td>
                            <td class="p-1 text-center text-gray-500">${diario.D || '-'}</td>
                            ${mostrarAsig ? `
                                <td class="p-2 text-center font-black bg-gray-50 border-l border-gray-300" rowspan="${grupo.p.length}">${grupo.a.toFixed(2)}</td>
                                <td class="p-2 text-center font-black bg-orange-50 text-orange-700" rowspan="${grupo.p.length}">${totalGrupoConsumo.toFixed(2)}</td>
                                <td class="p-2 text-center font-black ${saldoGrupo < 2 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-green-50 text-green-700'}" rowspan="${grupo.p.length}">${saldoGrupo.toFixed(2)}</td>
                            ` : ''}
                        </tr>`;
                });
            });

            actualizarResumen(tA, tC);
            mostrarAlertas(alertas);
        }

        // --- GESTIÓN DE ALERTAS ---
        function mostrarAlertas(alertas) {
            const cont = document.getElementById('contenedorAlertas');
            if(alertas.length === 0) { cont.classList.add('hidden'); return; }
            cont.classList.remove('hidden');
            cont.innerHTML = alertas.map(a => `
                <div class="bg-red-600 text-white p-2 rounded mb-1 text-xs flex justify-between items-center shadow-lg">
                    <span><i class="fas fa-exclamation-triangle mr-2"></i> <b>SALDO CRÍTICO:</b> ${a.resp} (${a.placa}) tiene solo <b>${a.saldo.toFixed(2)} GLN</b></span>
                </div>
            `).join('');
        }

        // --- MODAL Y CONFIGURACIÓN ---
        function abrirModalConfig() {
            document.getElementById('modalConfig').style.display = 'flex';
            const lista = document.getElementById('listaConfigFlota');
            lista.innerHTML = ESTRUCTURA_FLOTA.map((g, i) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2 font-mono text-xs">${g.p.join(', ')}</td>
                    <td class="p-2">${g.r}</td>
                    <td class="p-2 text-xs">${g.area}</td>
                    <td class="p-2 font-bold">${g.a}</td>
                    <td class="p-2 text-right">
                        <button onclick="eliminarFilaFlota(${i})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function agregarFlotaManual() {
            const p = document.getElementById('newPlacas').value.toUpperCase().split(',').map(x => x.trim());
            const r = document.getElementById('newResp').value.toUpperCase();
            const area = document.getElementById('newArea').value.toUpperCase();
            const a = parseFloat(document.getElementById('newAsig').value);

            if(p[0] && r && !isNaN(a)) {
                ESTRUCTURA_FLOTA.push({ p, r, area, a, shared: p.length > 1 });
                localStorage.setItem('config_flota_acp', JSON.stringify(ESTRUCTURA_FLOTA));
                abrirModalConfig();
                renderTabla(datosActuales);
            } else { alert("Completa todos los campos correctamente."); }
        }

        function eliminarFilaFlota(i) {
            if(confirm("¿Eliminar este registro?")) {
                ESTRUCTURA_FLOTA.splice(i, 1);
                localStorage.setItem('config_flota_acp', JSON.stringify(ESTRUCTURA_FLOTA));
                abrirModalConfig();
                renderTabla(datosActuales);
            }
        }

        function cerrarModalConfig() { document.getElementById('modalConfig').style.display = 'none'; }

        // --- SELECTOR DE SEMANAS Y NUBE ---
        async function cargarSemanaGuardada() {
            const id = document.getElementById('selectorSemanas').value;
            if(id === "actual") { renderTabla(datosActuales); return; }

            document.getElementById('indicadorCarga').classList.remove('hidden');
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getSnapshotDetail&id=${encodeURIComponent(id)}`);
                const json = await res.json();
                if (json.status === "OK") {
                    const obj = JSON.parse(json.data);
                    renderTabla(obj.consumos, obj.configFlota);
                } else { alert("No se encontró el detalle de esa semana."); }
            } catch (e) { alert("Error al conectar con la nube."); }
            document.getElementById('indicadorCarga').classList.add('hidden');
        }

        async function sincronizarDesdeNube() {
            const indicador = document.getElementById('indicadorCarga');
            indicador.classList.remove('hidden');
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getConsumoReal`);
                const data = await res.json();
                datosActuales = data;
                renderTabla(datosActuales);
                verificarPlacasNuevas(data);
            } catch (e) { alert("Error de sincronización."); }
            indicador.classList.add('hidden');
        }

        function verificarPlacasNuevas(datosRecibidos) {
            const registradas = new Set(ESTRUCTURA_FLOTA.flatMap(g => g.p));
            const nuevas = Object.keys(datosRecibidos).filter(placa => !registradas.has(placa));
            if (nuevas.length > 0) alert(`⚠️ PLACAS NO REGISTRADAS:\n${nuevas.join(', ')}\n\nUsa 'GESTIONAR FLOTA' para agregarlas.`);
        }

        function actualizarResumen(tA, tC) {
            document.getElementById('resumenAsignado').innerText = tA.toFixed(2) + " GLN";
            document.getElementById('resumenConsumido').innerText = tC.toFixed(2) + " GLN";
            document.getElementById('resumenSaldo').innerText = (tA - tC).toFixed(2) + " GLN";
            document.getElementById('resumenEficiencia').innerText = tA > 0 ? ((tC/tA)*100).toFixed(1) + "%" : "0%";
        }

        async function actualizarSelectorSemanas() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getFlotaSnapshots`);
                const semanas = await res.json();
                const sel = document.getElementById('selectorSemanas');
                sel.innerHTML = '<option value="actual">-- SEMANA ACTUAL --</option>';
                semanas.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.id}</option>`);
            } catch (e) { console.log("Error cargando lista de semanas."); }
        }

        function filtrarTabla() {
            const q = document.getElementById('buscador').value.toUpperCase();
            const filas = document.getElementById('cuerpoTabla').getElementsByTagName('tr');
            for (let f of filas) f.style.display = f.innerText.toUpperCase().includes(q) ? "" : "none";
        }

        window.onload = () => {
            actualizarSelectorSemanas();
            renderTabla();
        };

        function leerExcel(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets['dat_comb'];
                if(!sheet) return alert("Pestaña 'dat_comb' no encontrada.");
                const rows = XLSX.utils.sheet_to_json(sheet);
                const procesado = {};
                rows.forEach(row => {
                    const placa = row['Placa'] ? row['Placa'].toString().trim().toUpperCase() : null;
                    const cant = parseFloat(row['Ctd.en UM entrada']) || 0;
                    if(!placa) return;
                    const fecha = new Date(row['Fecha contabiliz.']);
                    const diaSemana = fecha.getDay();
                    if(!procesado[placa]) procesado[placa] = {L:0,M:0,Mi:0,J:0,V:0,S:0,D:0, total:0};
                    const mapaDias = {1:'L', 2:'M', 3:'Mi', 4:'J', 5:'V', 6:'S', 0:'D'};
                    procesado[placa][mapaDias[diaSemana]] += cant;
                    procesado[placa].total += cant;
                });
                datosActuales = procesado;
                renderTabla(datosActuales);
                verificarPlacasNuevas(procesado);
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        async function guardarSemanaCloud() {
            const nombre = prompt("Nombre de la semana (Ej: Semana_11_2026):");
            if(!nombre) return;
            document.getElementById('indicadorCarga').classList.remove('hidden');
            const payload = { 
                action: 'saveFlotaSnapshot', 
                idSemana: nombre, 
                data: JSON.stringify({
                    configFlota: ESTRUCTURA_FLOTA,
                    consumos: datosActuales,
                    fechaCierre: new Date().toLocaleString()
                }) 
            };
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("✅ Guardado en la nube.");
                actualizarSelectorSemanas();
            } catch (e) { alert("Error al guardar."); }
            document.getElementById('indicadorCarga').classList.add('hidden');
        }
    </script>
</body>
