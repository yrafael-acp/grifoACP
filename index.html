<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CORPORATIVO GRIFO ACP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #1e293b; --accent: #3b82f6; --diesel: #2563eb; 
            --gasohol: #10b981; --danger: #ef4444; --warning: #f59e0b; --success: #059669;
            --acp-green: #007d32;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: #334155; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        #mainContent { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); position: relative; }
        .full-width { grid-column: span 2; }
        .btn { cursor: pointer; padding: 12px; border: none; border-radius: 6px; font-weight: bold; color: white; transition: 0.2s; text-align: center; text-decoration: none; display: inline-block; }
        .btn-blue { background: var(--accent); width: 100%; }
        .btn-green { background: var(--success); }
        .btn-logout { background: var(--danger); font-size: 0.8rem; padding: 8px 15px; margin-left: 10px; }
        .btn-flota-sm { background: var(--acp-green); font-size: 0.8rem; padding: 8px 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .status-badge { padding: 5px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .bg-danger { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); }
        .bg-success { background: #dcfce7; color: var(--gasohol); }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .stock-label { font-size: 1.8rem; font-weight: bold; display: block; margin: 5px 0; }
        .sync-indicator { font-size: 0.75rem; color: #64748b; font-weight: normal; }
        .annual-summary { display: flex; gap: 15px; margin-top: 10px; }
        .summary-item { flex: 1; padding: 12px; border-radius: 8px; background: #f8fafc; border: 1px solid #cbd5e1; text-align: center; }
        .summary-value { font-size: 1.3rem; font-weight: bold; display: block; margin-top: 5px; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="Logo" style="height: 60px; margin-bottom: 20px;">
        <h2 id="loginTitle">Acceso GRIFO ACP</h2>
        <div id="loginForm">
            <input type="text" id="userInput" placeholder="USUARIO">
            <input type="password" id="passInput" placeholder="CONTRASEÑA">
            <button id="btnLogin" class="btn btn-blue" onclick="handleLogin()">Entrar</button>
        </div>
        <div id="changePassForm" style="display:none;">
            <input type="password" id="newPassInput" placeholder="NUEVA CONTRASEÑA">
            <input type="password" id="confirmPassInput" placeholder="CONFIRMAR CONTRASEÑA">
            <button class="btn btn-green" style="width:100%" onclick="saveNewPassword()">Actualizar y Entrar</button>
        </div>
    </div>
</div>

<div id="mainContent">
    <div class="dashboard">
        <div class="card full-width" style="background: var(--primary); color: white; display:flex; justify-content:space-between; align-items:center;">
            <div style="display: flex; align-items: center;">
                <img src="logo.png" alt="Logo" style="height: 50px; margin-right: 15px;">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem;">Gestión Corporativa - <span id="displayUser"></span></h1>
                    <span class="sync-indicator">Sinc: <span id="lastUpdate">-</span></span>
                </div>
            </div>
            <div>
                <a href="consumo-flota.html" class="btn btn-flota-sm">🚛 Flota</a>
                <button onclick="logout()" class="btn btn-logout">Salir</button>
            </div>
        </div>

        <div class="card admin-only" id="registroCard">
            <h2>Registro de Movimiento</h2>
            <input type="date" id="fechaMov">
            <select id="tipoMov"><option value="salida">Salida</option><option value="ingreso">Ingreso</option></select>
            <select id="prod"><option value="diesel">Diesel</option><option value="gasohol">Gasohol</option></select>
            <input type="number" id="cant" step="0.01" placeholder="Cantidad gl">
            <button class="btn btn-blue" onclick="procesarMovimiento()">Guardar</button>
        </div>

        <div class="card" id="monitorCard">
            <div style="display:flex; justify-content:space-between;">
                <h2>Monitor y Análisis</h2>
                <select id="selectAnioFiscal" onchange="calcularConsumoAnual()" style="width:auto;"><option value="2026">2026</option><option value="2025">2025</option></select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="status-badge bg-success" style="text-align:center;"><b>DIESEL</b><span id="sDiesel" class="stock-label">0.00</span></div>
                <div class="status-badge bg-success" style="text-align:center;"><b>GASOHOL</b><span id="sGasohol" class="stock-label">0.00</span></div>
            </div>
            <div style="margin-top:15px; border: 1px solid #cbd5e1; padding:10px; border-radius:8px;">
                <b>Consumo Acumulado <span id="currentYearDisplay"></span></b>
                <div class="annual-summary">
                    <div class="summary-item">DIESEL<span id="annualDiesel" class="summary-value">0.00 gl</span></div>
                    <div class="summary-item">GASOHOL<span id="annualGasohol" class="summary-value">0.00 gl</span></div>
                </div>
            </div>
            <canvas id="consumoChart" style="margin-top:10px;"></canvas>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwxbsOPKzgjO5ERY4R40Vo84fo7PZtDg3DJMc5dwxIQua6SsHrrHFt0uvCF8jEOO0wdLA/exec';
let datosCache = []; let miGrafico = null; let currentUser = null;

async function handleLogin() {
    const user = document.getElementById('userInput').value.trim().toUpperCase();
    const pass = document.getElementById('passInput').value.trim();
    const resp = await fetch(`${WEB_APP_URL}?action=login&user=${user}&pass=${pass}`);
    const res = await resp.json();
    if (res.auth === "OK") { currentUser = user; startSession(user); } else { alert("Error"); }
}

function startSession(user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('displayUser').innerText = user;
    if (user === "ADMIN") document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    cargarDatos(); setInterval(cargarDatos, 15000);
}

async function cargarDatos() {
    const res = await fetch(`${WEB_APP_URL}?action=read`);
    const data = await res.json();
    datosCache = data.historial;
    document.getElementById('sDiesel').innerText = data.stocks.diesel.toFixed(2);
    document.getElementById('sGasohol').innerText = data.stocks.gasohol.toFixed(2);
    calcularConsumoAnual();
    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
}

function parseFechaLatina(str) {
    if (!str) return null;
    const partes = str.toString().split(' ')[0].split(/[\/-]/);
    if (partes.length === 3) {
        // Maneja DD/MM/YYYY o YYYY/MM/DD
        return partes[0].length === 4 ? new Date(partes[0], partes[1]-1, partes[2]) : new Date(partes[2], partes[1]-1, partes[0]);
    }
    return new Date(str);
}

function calcularConsumoAnual() {
    const anio = document.getElementById('selectAnioFiscal').value;
    document.getElementById('currentYearDisplay').innerText = anio;
    let d = 0, g = 0;
    datosCache.forEach(h => {
        const f = parseFechaLatina(h.fecha);
        if (f && f.getFullYear().toString() === anio && h.mov.toUpperCase().includes("SALIDA")) {
            const cant = parseFloat(h.cant.toString().replace(',','')) || 0;
            if (h.prod.toUpperCase().includes("DIESEL")) d += cant;
            else if (h.prod.toUpperCase().includes("GASOHOL")) g += cant;
        }
    });
    document.getElementById('annualDiesel').innerText = d.toLocaleString() + " gl";
    document.getElementById('annualGasohol').innerText = g.toLocaleString() + " gl";
}

function logout() { location.reload(); }
</script>
</body>
</html>
