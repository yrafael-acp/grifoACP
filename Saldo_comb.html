<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPORTE DE SALDOS - ACP</title>
    <style>
        :root {
            --acp-green: #007d32;
            --acp-light: #f1f5f9;
            --danger: #ef4444;
            --secondary: #475569;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--acp-light); margin: 0; padding: 10px; color: #333; }
        
        .main-wrapper { max-width: 600px; margin: auto; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; border: 1px solid #e2e8f0; }
        
        /* Encabezado */
        .header-section { text-align: center; margin-bottom: 20px; }
        .header-logo { width: 130px; margin-bottom: 10px; }
        .title-bg { background-color: var(--acp-green); color: white; font-size: 1.4rem; font-weight: bold; padding: 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Ajuste Impecable de Fecha */
        .date-container { margin: 15px 0; width: 100%; }
        .date-box { border: 2px solid var(--acp-green); border-radius: 8px; overflow: hidden; }
        .date-label { background-color: #fff; color: var(--acp-green); font-size: 0.75rem; font-weight: bold; padding: 4px 0; display: block; text-transform: uppercase; border-bottom: 1px solid #eee; }
        #fechaReporte { border: none; padding: 10px; font-weight: bold; font-size: 1.1rem; color: #1e293b; width: 100%; text-align: center; cursor: pointer; outline: none; background: white; }

        /* Tarjetas de Datos de Usuario */
        .user-info { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .info-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #f8fafc; }
        .card-label { background-color: var(--acp-green); color: white; font-size: 0.8rem; font-weight: bold; padding: 6px; text-align: center; text-transform: uppercase; }
        .card-content { padding: 8px; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 1rem; color: #334155; }
        .readonly-field { background-color: #f1f5f9; font-weight: bold; border-color: #e2e8f0; }

        /* Tabla Profesional */
        .table-wrapper { width: 100%; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #333; padding: 10px 5px; text-align: center; font-size: 0.85rem; }
        th { background-color: var(--acp-green); color: white; font-weight: 600; text-transform: uppercase; }
        
        .gasolina-label { background-color: #ff0000; color: white; font-weight: bold; }
        .petroleo-label { background-color: var(--acp-green); color: white; font-weight: bold; }
        .cell-bold { font-weight: bold; color: #0f172a; font-size: 1rem; }

        /* Botones */
        .button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; transition: all 0.2s; }
        .btn-guardar { background-color: var(--acp-green); color: white; box-shadow: 0 4px 6px -1px rgba(0, 125, 50, 0.3); }
        .btn-descargar { background-color: #334155; color: white; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        @media screen and (max-width: 480px) {
            .title-bg { font-size: 1.2rem; }
            th, td { font-size: 0.75rem; padding: 8px 3px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container" id="captureArea">
        <div class="header-section">
            <img src="logo.png" alt="Logo ACP" class="header-logo">
            <div class="title-bg">Reporte de Saldos</div>
        </div>

        <div class="date-container">
            <div class="date-box">
                <span class="date-label">Fecha de Reporte</span>
                <input type="date" id="fechaReporte">
            </div>
        </div>

        <div class="user-info">
            <div class="info-card">
                <div class="card-label">DNI</div>
                <div class="card-content">
                    <input type="text" id="dniInput" class="readonly-field" readonly placeholder="Seleccione operario">
                </div>
            </div>
            <div class="info-card">
                <div class="card-label">Operario</div>
                <div class="card-content">
                    <select id="operarioSelect" onchange="vincularDNI()">
                        <option value="">-- Seleccionar --</option>
                        <option value="77103804">WILDER NEYRA PAICO</option>
                        <option value="76181486">LUIS ANGEL JUAREZ ELIAS</option>
                        <option value="74308732">CARLOS ORRILLO CRUZADO</option>
                        <option value="41892133">CRISTIAN GONZALES UCEDA</option>
                        <option value="76377901">ANGELO SALAZAR DEL AGUILA</option>
                        <option value="16454237">FELIPE FERNANDEZ TERRONES</option>
                    </select>
                </div>
            </div>
            <div class="info-card">
                <div class="card-label">Turno</div>
                <div class="card-content">
                    <select id="turnoSelect" onchange="guardarEnNube()">
                        <option value="DIA">DIA</option>
                        <option value="NOCHE">NOCHE</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">PRODUCTO</th>
                        <th>V. FINAL</th>
                        <th>SALDO</th>
                        <th>ISOT.</th>
                        <th>TOT. GLS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="gasolina-label">GASOLINA</td>
                        <td><input type="number" id="vGasolina" step="0.1" oninput="calcularTotales()"></td>
                        <td id="sGasolina" class="readonly-field">0.00</td>
                        <td><input type="number" id="iGasolina" class="readonly-field" readonly></td>
                        <td id="tGasolina" class="cell-bold">0.00</td>
                    </tr>
                    <tr>
                        <td class="petroleo-label">PETROLEO</td>
                        <td><input type="number" id="vPetroleo" step="0.1" oninput="calcularTotales()"></td>
                        <td id="sPetroleo" class="readonly-field">0.00</td>
                        <td><input type="number" id="iPetroleo" class="readonly-field" readonly></td>
                        <td id="tPetroleo" class="cell-bold">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-guardar" onclick="enviarReporteFinal()">Enviar Reporte Final</button>
        <button id="btnImg" class="btn btn-descargar" onclick="descargarComoImagen()">Descargar como Imagen</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwIIm2kt01jwia7nlpxB6LPFnmp3iigJ4SaGC-QVYfCFLRYWcG7uTLJrx3zYV1xhWYh6Q/exec";

    // Lógica de carga y cálculos (se mantiene tu estructura funcional)
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const resFecha = await fetch(`${scriptUrl}?action=getUltimaFecha`);
            const dataFecha = await resFecha.json();
            if (dataFecha.fecha) document.getElementById('fechaReporte').value = dataFecha.fecha;

            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            if (dataSist.reservas) {
                document.getElementById('iGasolina').value = dataSist.reservas.gasohol || 0;
                document.getElementById('iPetroleo').value = dataSist.reservas.diesel || 0;
            }
            calcularTotales();
        } catch (e) { console.error(e); }
    });

    async function calcularTotales() {
        const vGas = document.getElementById('vGasolina').value;
        const vPet = document.getElementById('vPetroleo').value;
        actualizarSaldo('GASOLINA', vGas, 'sGasolina', 'iGasolina', 'tGasolina');
        actualizarSaldo('PETROLEO', vPet, 'sPetroleo', 'iPetroleo', 'tPetroleo');
    }

    async function actualizarSaldo(tipo, valor, idSaldo, idIso, idTotal) {
        if (valor >= 0) {
            const res = await fetch(`${scriptUrl}?action=getSaldoVarilla&tipo=${tipo}&valor=${valor}`);
            const data = await res.json();
            if (data.saldo !== undefined) {
                const s = parseFloat(data.saldo);
                document.getElementById(idSaldo).innerText = s.toFixed(2);
                const iso = parseFloat(document.getElementById(idIso).value) || 0;
                document.getElementById(idTotal).innerText = (s + iso).toFixed(2);
            }
        }
    }

    function vincularDNI() {
        document.getElementById('dniInput').value = document.getElementById('operarioSelect').value;
    }

    // DESCARGA DE IMAGEN MEJORADA PARA JEFATURA
    function descargarComoImagen() {
        const area = document.getElementById('captureArea');
        const btnImg = document.getElementById('btnImg');
        btnImg.innerText = "Procesando...";

        html2canvas(area, {
            scale: 3, // Máxima calidad
            useCORS: true,
            backgroundColor: "#ffffff",
            borderRadius: 12,
            onclone: (clonedDoc) => {
                // Aseguramos que el recuadro de fecha no se mueva en el clon
                clonedDoc.getElementById('captureArea').style.boxShadow = "none";
                clonedDoc.getElementById('captureArea').style.border = "none";
            }
        }).then(canvas => {
            const link = document.createElement('a');
            const fechaVal = document.getElementById('fechaReporte').value;
            link.download = `REPORTE_SALDOS_ACP_${fechaVal}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btnImg.innerText = "Descargar como Imagen";
        });
    }

    function enviarReporteFinal() {
        alert("Reporte enviado con éxito al servidor.");
    }
</script>

</body>
</html>
