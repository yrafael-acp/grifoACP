<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPORTE DE SALDOS - ACP</title>
    <style>
        :root {
            --acp-green: #007d32;
            --acp-light: #f1f5f9;
            --danger: #ef4444;
            --secondary: #64748b;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--acp-light); margin: 0; padding: 10px; }
        
        .main-wrapper { max-width: 900px; margin: auto; }
        .container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; overflow: hidden; }
        
        /* Encabezado Principal */
        .header-section { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .date-section { text-align: right; font-weight: bold; font-size: 0.9em; }
        #fechaReporte { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 1em; }
        .header-logo { width: 120px; }
        .title-bg { background-color: var(--acp-green); color: white; font-size: 1.3rem; font-weight: bold; text-align: center; padding: 10px; flex: 1; border-radius: 4px; text-transform: uppercase; }

        /* Sección de Usuario (Responsive) */
        .user-cards-section { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .user-card { flex: 1; min-width: calc(33.333% - 10px); background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; }
        .user-card-header { background-color: var(--acp-green); color: white; font-size: 0.85em; font-weight: bold; padding: 5px; text-align: center; text-transform: uppercase; }
        .user-card-body { padding: 10px; text-align: center; }
        
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1rem; }
        .readonly-field { background-color: #eee; font-weight: bold; color: #333; }

        /* Tabla de Combustible (Responsive) */
        .fuel-table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table.fuel-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: auto; }
        .fuel-table th, .fuel-table td { border: 1px solid #333; padding: 8px 4px; text-align: center; font-size: 0.85em; }
        .fuel-table th { background-color: var(--acp-green); color: white; text-transform: uppercase; }
        .fuel-table td { font-weight: bold; }
        
        .gasolina-label { background-color: red; color: white; }
        .petroleo-label { background-color: var(--acp-green); color: white; }
        .cell-total { font-size: 1.1em; font-weight: bold; color: #333; }

        /* Botones Finales */
        .button-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; flex: 1; min-width: 200px; text-transform: uppercase; }
        .btn-guardar { background-color: var(--acp-green); color: white; }
        .btn-descargar { background-color: var(--secondary); color: white; }
        .btn-guardar:hover { background-color: #005e26; }
        .btn-descargar:hover { background-color: #475569; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Media Queries para Pantallas Pequeñas */
        @media screen and (max-width: 600px) {
            body { padding: 5px; }
            .container { padding: 10px; }
            .header-section { flex-direction: column; text-align: center; }
            .date-section { text-align: center; }
            .header-logo { width: 100px; }
            .title-bg { width: 100%; font-size: 1.1rem; }
            
            .user-card { min-width: 100%; }
            .user-card-header { font-size: 0.9em; }
            
            /* Abreviar encabezados largos de la tabla */
            .fuel-table th.varilla::after { content: " V. FINAL"; display: block; font-size: 0.7em; }
            .fuel-table th.total::after { content: " TOT. GLS"; display: block; font-size: 0.7em; }
            .th-long { display: none; }
            
            .gasolina-label, .petroleo-label { font-size: 0.8em; }
            .fuel-table td input { font-size: 0.9em; padding: 6px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container" id="captureArea">
        <div class="date-section no-export">
            FECHA: <input type="date" id="fechaReporte">
        </div>

        <div class="header-section">
            <img src="logo.png" alt="ACP" class="header-logo">
            <div class="title-bg">REPORTE DE SALDOS</div>
        </div>

        <div class="user-cards-section">
            <div class="user-card">
                <div class="user-card-header">DNI</div>
                <div class="user-card-body">
                    <input type="text" id="dniInput" class="readonly-field" readonly placeholder="--------">
                </div>
            </div>
            <div class="user-card">
                <div class="user-card-header">NOMBRES Y APELLIDOS</div>
                <div class="user-card-body">
                    <select id="operarioSelect" onchange="vincularDNI()">
                        <option value="">-- Seleccione Operario --</option>
                        <option value="77103804">WILDER NEYRA PAICO</option>
                        <option value="76181486">LUIS ANGEL JUAREZ ELIAS</option>
                        <option value="74308732">CARLOS ORRILLO CRUZADO</option>
                        <option value="41892133">CRISTIAN GONZALES UCEDA</option>
                        <option value="76377901">ANGELO SALAZAR DEL AGUILA</option>
                        <option value="16454237">FELIPE FERNANDEZ TERRONES</option>
                    </select>
                </td>
                </div>
            </div>
            <div class="user-card">
                <div class="user-card-header">TURNO</div>
                <div class="user-card-body">
                    <select id="turnoSelect" onchange="guardarEnNube()">
                        <option value="DIA">DIA</option>
                        <option value="NOCHE">NOCHE</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="fuel-table-wrapper">
            <table class="fuel-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">PRODUCTO</th>
                        <th style="width: 20%;">V. FINAL</th>
                        <th style="width: 20%;">SALDO</th>
                        <th style="width: 20%;">ISOT.</th>
                        <th style="width: 20%;">TOT. GLS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="gasolina-label">GASOLINA</td>
                        <td><input type="number" id="vGasolina" step="0.1" value="0.0" oninput="calcularTotales()"></td>
                        <td id="sGasolina">0.00</td>
                        <td><input type="number" id="iGasolina" class="readonly-field" readonly step="0.01" value="0.00"></td>
                        <td id="tGasolina" class="cell-total">0.00</td>
                    </tr>
                    <tr>
                        <td class="petroleo-label">PETROLEO</td>
                        <td><input type="number" id="vPetroleo" step="0.1" value="0.0" oninput="calcularTotales()"></td>
                        <td id="sPetroleo">0.00</td>
                        <td><input type="number" id="iPetroleo" class="readonly-field" readonly step="0.01" value="0.00"></td>
                        <td id="tPetroleo" class="cell-total">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-guardar" onclick="enviarReporteFinal()">ENVIAR REPORTE FINAL</button>
        <button id="btnImg" class="btn btn-descargar" onclick="descargarComoImagen()">DESCARGAR COMO IMAGEN</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwIIm2kt01jwia7nlpxB6LPFnmp3iigJ4SaGC-QVYfCFLRYWcG7uTLJrx3zYV1xhWYh6Q/exec";

    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const resFecha = await fetch(`${scriptUrl}?action=getUltimaFecha`);
            const dataFecha = await resFecha.json();
            if (dataFecha.fecha) document.getElementById('fechaReporte').value = dataFecha.fecha;

            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            if (dataSist.reservas) {
                document.getElementById('iGasolina').value = dataSist.reservas.gasohol || 0;
                document.getElementById('iPetroleo').value = dataSist.reservas.diesel || 0;
            }

            const resBorrador = await fetch(`${scriptUrl}?action=getEstadoBorrador`);
            const borrador = await resBorrador.json();
            if (borrador) {
                document.getElementById('vGasolina').value = borrador.vGas;
                document.getElementById('vPetroleo').value = borrador.vPet;
                document.getElementById('operarioSelect').value = borrador.operario;
                document.getElementById('turnoSelect').value = borrador.turno;
                vincularDNI();
            }

            calcularTotales();
        } catch (e) { console.error("Error inicializando:", e); }
    });

    async function guardarEnNube() {
        const datos = {
            action: 'guardarEstadoBorrador',
            vGas: document.getElementById('vGasolina').value,
            vPet: document.getElementById('vPetroleo').value,
            operario: document.getElementById('operarioSelect').value,
            turno: document.getElementById('turnoSelect').value
        };
        await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
    }

    function vincularDNI() {
        const select = document.getElementById('operarioSelect');
        document.getElementById('dniInput').value = select.value;
        guardarEnNube();
    }

    async function calcularTotales() {
        const vGas = document.getElementById('vGasolina').value;
        const vPet = document.getElementById('vPetroleo').value;
        guardarEnNube();
        actualizarSaldoCombustible('GASOLINA', vGas, 'sGasolina', 'iGasolina', 'tGasolina');
        actualizarSaldoCombustible('PETROLEO', vPet, 'sPetroleo', 'iPetroleo', 'tPetroleo');
    }

    async function actualizarSaldoCombustible(tipo, valorVarilla, idSaldo, idIso, idTotal) {
        if (parseFloat(valorVarilla) >= 0) {
            try {
                const response = await fetch(`${scriptUrl}?action=getSaldoVarilla&tipo=${tipo}&valor=${valorVarilla}`);
                const data = await response.json();
                if (data.saldo !== undefined) {
                    const saldoFinal = parseFloat(data.saldo);
                    document.getElementById(idSaldo).innerText = saldoFinal.toFixed(2);
                    const iso = parseFloat(document.getElementById(idIso).value) || 0;
                    document.getElementById(idTotal).innerText = (saldoFinal + iso).toFixed(2);
                }
            } catch (e) { console.error(`Error en ${tipo}:`, e); }
        }
    }

    async function enviarReporteFinal() {
        if (!document.getElementById('operarioSelect').value) {
            alert("Por favor seleccione un operario");
            return;
        }

        const data = {
            action: 'saveReporteSaldos',
            fecha: document.getElementById('fechaReporte').value,
            dni: document.getElementById('dniInput').value,
            operario: document.getElementById('operarioSelect').options[document.getElementById('operarioSelect').selectedIndex].text,
            turno: document.getElementById('turnoSelect').value,
            gasVarilla: document.getElementById('vGasolina').value,
            gasSaldo: document.getElementById('sGasolina').innerText,
            gasIso: document.getElementById('iGasolina').value,
            gasTotal: document.getElementById('tGasolina').innerText,
            petVarilla: document.getElementById('vPetroleo').value,
            petSaldo: document.getElementById('sPetroleo').innerText,
            petIso: document.getElementById('iPetroleo').value,
            petTotal: document.getElementById('tPetroleo').innerText
        };

        const btn = document.querySelector('.btn-guardar');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Reporte guardado con éxito.");
        } catch (e) {
            alert("Error al guardar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR REPORTE FINAL";
        }
    }

    // --- FUNCIÓN DE EXPORTACIÓN (AJUSTADA PARA RESPONSIVE) ---
    function descargarComoImagen() {
        const area = document.getElementById('captureArea');
        const btnImg = document.getElementById('btnImg');

        btnImg.innerText = "GENERANDO...";
        btnImg.disabled = true;

        // Forzamos un ancho de captura mayor para asegurar la renderización
        const width = 800;

        html2canvas(area, {
            scale: 2, // Mejora la calidad
            useCORS: true,
            width: width, // Ancho fijo para la captura
            onclone: (clonedDoc) => {
                // Modificamos el clon para que el diseño se renderice perfecto en la imagen
                clonedDoc.getElementById('captureArea').style.width = `${width}px`;
                clonedDoc.getElementById('captureArea').style.padding = '20px';
                
                // Ocultamos la sección de fecha durante la exportación (solo la imagen)
                const dateSec = clonedDoc.querySelector('.date-section');
                if (dateSec) dateSec.style.display = 'none';
            }
        }).then(canvas => {
            const link = document.createElement('a');
            const fecha = document.getElementById('fechaReporte').value || 'reporte';
            link.download = `Saldo_ACP_${fecha}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            btnImg.innerText = "DESCARGAR COMO IMAGEN";
            btnImg.disabled = false;
        });
    }
</script>

</body>
</html>
