<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP - CONTROL DE FLOTA NUBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-acp { background-color: #007d32; }
        .table-container { max-height: 65vh; overflow-y: auto; }
        @media (max-width: 768px) {
            .table-container { max-height: none; overflow: visible; }
            thead { display: none; }
            tr { display: block; margin-bottom: 1.5rem; border: 2px solid #e5e7eb; border-radius: 1rem; background: white; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
            td { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0 !important; border: none !important; border-bottom: 1px solid #f3f4f6 !important; text-align: right; }
            td:last-child { border-bottom: none !important; }
            td::before { content: attr(data-label); font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: #6b7280; text-align: left; margin-right: 10px; }
        }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); align-items: center; justify-content: center; }
        .modal-content { max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-acp text-white p-3 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3 w-full lg:w-auto justify-center lg:justify-start">
                <i class="fas fa-truck-moving text-2xl text-yellow-400"></i>
                <div>
                    <h1 class="text-lg font-bold italic leading-none">FLOTA NUBE</h1>
                    <span class="text-[10px] uppercase tracking-widest opacity-80">Agrícola Cerro Prieto</span>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-2">
                <select id="selectorAnio" onchange="cambiarAnio()" class="bg-green-900 text-white text-[11px] p-2 rounded border border-white/30"></select>
                <select id="selectorSemanas" onchange="gestionarCambioSemana()" class="bg-green-900 text-white text-[11px] p-2 rounded border border-white/30 outline-none w-full sm:w-auto"></select>
            </div>

            <div class="flex flex-wrap justify-center gap-2 w-full lg:w-auto">
                <button onclick="abrirModalRegistro()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded-lg font-bold text-[10px] transition shadow flex items-center">
                    <i class="fas fa-gas-pump mr-1"></i> REGISTRAR
                </button>
                <button onclick="abrirModalConsulta()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg font-bold text-[10px] transition shadow flex items-center">
                    <i class="fas fa-search-dollar mr-1"></i> CONSULTA ÓRDENES
                </button>
                <button onclick="sincronizarDesdeNube()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold text-[10px] transition shadow flex items-center">
                    <i class="fas fa-sync-alt mr-1"></i> SINCRONIZAR
                </button>
                <button onclick="abrirModalConfig()" class="bg-gray-700 hover:bg-gray-800 text-white px-3 py-2 rounded-lg font-bold text-[10px] transition shadow">
                    <i class="fas fa-cog"></i>
                </button>
                <button onclick="guardarSemanaCloud()" class="bg-yellow-500 hover:bg-yellow-600 text-green-900 px-3 py-2 rounded-lg font-bold text-[10px] transition shadow">
                    <i class="fas fa-cloud-upload-alt mr-1"></i> CERRAR
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1580px] mx-auto p-3">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-blue-600">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Gln Asignado</span>
                <p id="resumenAsignado" class="text-lg font-black text-blue-900">0.00</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-orange-500">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Gln Consumido</span>
                <p id="resumenConsumido" class="text-lg font-black text-orange-600">0.00</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-green-600">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Saldo Disp.</span>
                <p id="resumenSaldo" class="text-lg font-black text-green-700">0.00</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-purple-600">
                <span class="text-[9px] font-bold text-gray-400 uppercase">% Eficiencia</span>
                <p id="resumenEficiencia" class="text-lg font-black text-purple-800">0%</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="p-3 border-b bg-gray-50 flex flex-col md:flex-row justify-between items-center gap-3">
                <div class="relative w-full md:w-96">
                    <i class="fas fa-search absolute left-3 top-2.5 text-gray-400"></i>
                    <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar placa, responsable o área..." class="pl-9 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div id="indicadorCarga" class="hidden text-green-600 font-bold animate-pulse text-[10px]">
                    <i class="fas fa-spinner fa-spin mr-1"></i> PROCESANDO...
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-left text-xs border-collapse" id="tablaFlota">
                    <thead class="bg-gray-800 text-white sticky top-0 z-20">
                        <tr>
                            <th class="p-3">PLACA</th>
                            <th class="p-3">RESPONSABLE / ÁREA</th>
                            <th class="p-3 text-center bg-blue-900">L</th>
                            <th class="p-3 text-center bg-blue-900">M</th>
                            <th class="p-3 text-center bg-blue-900">Mi</th>
                            <th class="p-3 text-center bg-blue-900">J</th>
                            <th class="p-3 text-center bg-blue-900">V</th>
                            <th class="p-3 text-center bg-blue-900">S</th>
                            <th class="p-3 text-center bg-blue-900">D</th>
                            <th class="p-3 text-center border-l bg-gray-700">ASIG.</th>
                            <th class="p-3 text-center bg-orange-700">CONS.</th>
                            <th class="p-3 text-center bg-green-700">SALDO</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-gray-200 text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalRegistro" class="modal">
        <div class="bg-white rounded-xl shadow-2xl w-[90%] md:w-[450px] overflow-hidden">
            <div class="p-4 bg-orange-600 text-white flex justify-between items-center">
                <h2 class="font-bold uppercase text-sm"><i class="fas fa-edit mr-2"></i> Registrar Despacho</h2>
                <button onclick="cerrarModal('modalRegistro')" class="text-white text-2xl">&times;</button>
            </div>
            <div class="p-5 space-y-3">
                <input type="text" id="regPlaca" class="w-full p-2 border rounded uppercase font-bold" placeholder="Placa">
                <input type="date" id="regFecha" class="w-full p-2 border rounded">
                <select id="regTipo" class="w-full p-2 border rounded">
                    <option value="GASOHOL 90">GASOHOL 90</option>
                    <option value="DIESEL B5 S50">DIESEL B5 S50</option>
                </select>
                <input type="number" id="regCant" step="0.01" class="w-full p-2 border rounded" placeholder="Cantidad GLN">
                <button onclick="guardarRegistroManual()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold hover:bg-orange-700 transition">ENVIAR A NUBE</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwIIm2kt01jwia7nlpxB6LPFnmp3iigJ4SaGC-QVYfCFLRYWcG7uTLJrx3zYV1xhWYh6Q/exec';
        
        let ESTRUCTURA_FLOTA = [];
        let lunesReferencia = new Date();

        // --- RENDERIZADO ---
        function renderTabla(datos) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            let tA = 0, tC = 0;

            datos.forEach(grupo => {
                const totalGrupoConsumo = parseFloat(grupo.total || 0);
                const saldoGrupo = parseFloat(grupo.a || 0) - totalGrupoConsumo;
                const esAlerta = saldoGrupo < 2;

                grupo.p.forEach((placa, index) => {
                    const esPrimeraPlaca = index === 0;
                    if(esPrimeraPlaca) { 
                        tA += parseFloat(grupo.a || 0); 
                        tC += totalGrupoConsumo; 
                    }

                    cuerpo.innerHTML += `
                        <tr class="${grupo.p.length > 1 ? 'bg-gray-50' : ''} hover:bg-yellow-50 transition-colors">
                            <td data-label="Placa" class="p-2 font-bold border-r ${esAlerta ? 'text-red-600' : 'text-blue-800'}">
                                <div class="flex items-center justify-between">
                                    <span>${placa}</span>
                                    <button onclick="abrirEditarFlota('${placa}', ${grupo.a})" class="text-gray-300 hover:text-green-600 ml-2">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                </div>
                            </td>
                            <td data-label="Responsable" class="p-2 border-r">
                                <span class="font-bold block text-[10px]">${grupo.r}</span>
                                <span class="text-[9px] text-gray-400 uppercase">${grupo.area}</span>
                            </td>
                            <td data-label="L" class="p-1 text-center border-r">${grupo.L || '-'}</td>
                            <td data-label="M" class="p-1 text-center border-r">${grupo.M || '-'}</td>
                            <td data-label="Mi" class="p-1 text-center border-r">${grupo.Mi || '-'}</td>
                            <td data-label="J" class="p-1 text-center border-r">${grupo.J || '-'}</td>
                            <td data-label="V" class="p-1 text-center border-r">${grupo.V || '-'}</td>
                            <td data-label="S" class="p-1 text-center border-r">${grupo.S || '-'}</td>
                            <td data-label="D" class="p-1 text-center border-r">${grupo.D || '-'}</td>
                            <td data-label="Asig." class="p-2 text-center font-bold bg-gray-50 border-l">
                                ${esPrimeraPlaca ? grupo.a.toFixed(2) : '-'}
                            </td>
                            <td data-label="Cons." class="p-2 text-center font-bold bg-orange-50 text-orange-700">
                                ${esPrimeraPlaca ? totalGrupoConsumo.toFixed(2) : '-'}
                            </td>
                            <td data-label="Saldo" class="p-2 text-center font-black ${esAlerta ? 'bg-red-600 text-white animate-pulse' : 'bg-green-100 text-green-800'}">
                                ${esPrimeraPlaca ? saldoGrupo.toFixed(2) : '-'}
                            </td>
                        </tr>`;
                });
            });
            actualizarResumen(tA, tC);
        }

        // --- LÓGICA NUBE ---
        async function sincronizarDesdeNube() {
            const indicador = document.getElementById('indicadorCarga');
            indicador.classList.remove('hidden');
            try {
                const fechaStr = lunesReferencia.toISOString().split('T')[0];
                const res = await fetch(`${WEB_APP_URL}?action=getFlota&fecha=${fechaStr}`);
                const data = await res.json();
                ESTRUCTURA_FLOTA = data;
                renderTabla(data);
            } catch (e) {
                console.error("Error sincronizando:", e);
                alert("Error al obtener datos.");
            } finally {
                indicador.classList.add('hidden');
            }
        }

        async function guardarRegistroManual() {
            const payload = {
                action: 'saveTemporal',
                placa: document.getElementById('regPlaca').value.toUpperCase().trim(),
                fecha: document.getElementById('regFecha').value,
                tipo: document.getElementById('regTipo').value,
                cantidad: parseFloat(document.getElementById('regCant').value)
            };

            if(!payload.placa || !payload.fecha || isNaN(payload.cantidad)) return alert("Datos incompletos.");

            try {
                // Se usa 'no-cors' para evitar problemas de pre-flight en Apps Script
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                alert("Registro enviado a la nube correctamente.");
                cerrarModal('modalRegistro');
                setTimeout(sincronizarDesdeNube, 2000); // Recarga después de 2 seg para dar tiempo al servidor
            } catch (e) { alert("Error al conectar."); }
        }

        // --- AUXILIARES ---
        function getLunesActual(fechaBase) {
            const d = new Date(fechaBase);
            d.setHours(12,0,0,0);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function actualizarResumen(tA, tC) {
            document.getElementById('resumenAsignado').innerText = tA.toFixed(2);
            document.getElementById('resumenConsumido').innerText = tC.toFixed(2);
            document.getElementById('resumenSaldo').innerText = (tA - tC).toFixed(2);
            document.getElementById('resumenEficiencia').innerText = tA > 0 ? ((tC/tA)*100).toFixed(1) + "%" : "0%";
        }

        function poblarAnios() {
            const sel = document.getElementById('selectorAnio');
            const anioActual = new Date().getFullYear();
            for (let y = 2025; y <= anioActual; y++) {
                const opt = new Option(y, y);
                if (y === anioActual) opt.selected = true;
                sel.add(opt);
            }
        }

        function poblarSemanasPorAnio(anio) {
            const sel = document.getElementById('selectorSemanas');
            sel.innerHTML = '';
            let f = getLunesActual(new Date(`${anio}-01-01T12:00:00`));
            const hoyLunes = getLunesActual(new Date()).toISOString().split('T')[0];
            let opciones = [];

            while (f.getFullYear() <= anio) {
                let fin = new Date(f); fin.setDate(f.getDate() + 6);
                opciones.push({ val: f.toISOString().split('T')[0], text: `Sem: ${f.toLocaleDateString()} al ${fin.toLocaleDateString()}` });
                f.setDate(f.getDate() + 7);
            }

            opciones.reverse().forEach(op => {
                const opt = new Option(op.text, op.val);
                if (op.val === hoyLunes) opt.selected = true;
                sel.add(opt);
            });
        }

        function gestionarCambioSemana() {
            lunesReferencia = new Date(document.getElementById('selectorSemanas').value + "T12:00:00");
            sincronizarDesdeNube();
        }

        function cambiarAnio() {
            poblarSemanasPorAnio(document.getElementById('selectorAnio').value);
            gestionarCambioSemana();
        }

        function filtrarTabla() {
            const q = document.getElementById('buscador').value.toUpperCase();
            document.querySelectorAll('#cuerpoTabla tr').forEach(row => {
                row.style.display = row.innerText.toUpperCase().includes(q) ? "" : "none";
            });
        }

        function abrirModalRegistro() { document.getElementById('modalRegistro').style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        // Inicialización
        window.onload = async () => {
            poblarAnios();
            poblarSemanasPorAnio(new Date().getFullYear());
            lunesReferencia = getLunesActual(new Date());
            await sincronizarDesdeNube();
        };

    </script>
</body>
</html>
