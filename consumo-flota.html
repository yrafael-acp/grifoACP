<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSUMO FLOTA - ACP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-acp { background-color: #007d32; }
        .table-container { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-acp text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-truck-moving text-2xl"></i>
                <h1 class="text-xl font-bold">CONSUMO FLOTA - ACP</h1>
            </div>
            <div class="flex items-center gap-4">
                <input type="file" id="uploadExcel" accept=".xlsx, .xls" class="hidden" onchange="leerExcel(this)">
                <button onclick="document.getElementById('uploadExcel').click()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-bold text-sm transition">
                    <i class="fas fa-file-import mr-2"></i> Cargar dat_comb
                </button>
                <div class="bg-white/10 px-3 py-1 rounded-lg border border-white/20">
                    <span id="labelSemana" class="font-bold text-sm">Semana 10 (02/03 - 08/03)</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <span class="text-xs font-bold text-gray-400 uppercase">Total Asignado</span>
                <p id="resumenAsignado" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500">
                <span class="text-xs font-bold text-gray-400 uppercase">Total Consumido</span>
                <p id="resumenConsumido" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                <span class="text-xs font-bold text-gray-400 uppercase">Saldo Disponible</span>
                <p id="resumenSaldo" class="text-2xl font-black">0.00 GLN</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-500">
                <span class="text-xs font-bold text-gray-400 uppercase">Eficiencia</span>
                <p id="resumenEficiencia" class="text-2xl font-black">0%</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar placa o responsable..." class="px-4 py-2 border rounded-lg text-sm w-80 outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="exportarTabla()" class="text-green-700 font-bold text-sm hover:underline"><i class="fas fa-file-excel mr-1"></i> Exportar Vista</button>
            </div>
            <div class="table-container">
                <table class="w-full text-left text-sm" id="tablaFlota">
                    <thead class="bg-gray-100 sticky top-0 font-bold text-gray-600 border-b">
                        <tr>
                            <th class="p-4">PLACA</th>
                            <th class="p-4">RESPONSABLE</th>
                            <th class="p-4 text-center">ASIGNADO</th>
                            <th class="p-4 text-center">CONSUMIDO</th>
                            <th class="p-4 text-center">SALDO</th>
                            <th class="p-4 text-center">ESTADO</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // LISTA COMPLETA DE 73 PLACAS SEGÚN CAPTURA
        const CONFIG_FLOTA = [
            {p: "BRI090", r: "WENDY CHILCON", a: 15.00}, {p: "BRI612", r: "LUIS MACHER", a: 15.00},
            {p: "BRI635", r: "JAVIER CALLIRGOS", a: 15.00}, {p: "AZO588", r: "KARINA VASQUEZ", a: 15.00},
            {p: "AZO431", r: "GISEL TIXE", a: 15.00}, {p: "M6K436", r: "PLANILLAS", a: 12.00},
            {p: "CCM367", r: "T.I GASOHOL", a: 35.00}, {p: "BYN781", r: "LILIANA CHAFLOC", a: 25.00},
            {p: "BYN705", r: "OSCAR HERNANDEZ", a: 35.00}, {p: "BYN755", r: "MARITA CCOLLCA", a: 50.00},
            {p: "BYM949", r: "LUIS REAÑO", a: 48.00}, {p: "BXM905", r: "MANUEL MARENGO", a: 48.00},
            {p: "BYM944", r: "LUIS REAÑO", a: 53.00}, {p: "BZT777", r: "LUIS REAÑO", a: 38.00},
            {p: "BYN730", r: "VICTOR YEMHENG", a: 25.00}, {p: "BYN729", r: "LUIS QUIROZ", a: 25.00},
            {p: "BYN731", r: "EDUARDO DIAZ", a: 25.00}, {p: "CDR941", r: "ABRAHAM ZAPATA", a: 30.00},
            {p: "W4V068", r: "PROYECTO SAP", a: 16.00}, {p: "VCG910", r: "LUIS REAÑO", a: 30.00},
            {p: "BUP776", r: "LUIS MACHER", a: 30.00}, {p: "BUL903", r: "CRISTIAN TESEN", a: 30.00},
            {p: "BUN930", r: "LUIS DIEZ", a: 40.00}, {p: "CDS806", r: "WENDY CHILCON", a: 30.00},
            {p: "BUN746", r: "JENIFER AGURTO", a: 30.00}, {p: "BUO942", r: "ARTURO CERRUTTI", a: 30.00},
            {p: "BXN705", r: "ROLI PALMA", a: 30.00}, {p: "BUO749", r: "ROLI PALMA", a: 30.00},
            {p: "BUO792", r: "JAVIER PASAPERA", a: 30.00}, {p: "BUO808", r: "RONALD RUIZ", a: 30.00},
            {p: "BRG897", r: "MANUEL MARENGO", a: 50.00}, {p: "CDR887", r: "JULIO YIANCCE", a: 30.00},
            {p: "BRI725", r: "JULIO YIANCCE", a: 50.00}, {p: "CKW496", r: "MANUEL MARENGO", a: 30.00},
            {p: "BWV868", r: "ALBERTO CIEZA", a: 25.00}, {p: "BUD924", r: "YENNI ROJAS", a: 30.00},
            {p: "BUF786", r: "MANUEL MARENGO", a: 35.00}, {p: "BSH717", r: "MANUEL MARENGO", a: 35.00},
            {p: "BUF836", r: "MANUEL MARENGO", a: 35.00}, {p: "CTH457", r: "MANUEL MARENGO", a: 40.00},
            {p: "BUE757", r: "HARRY BERNAOLA", a: 30.00}, {p: "BUE802", r: "JOSE MANRIQUE", a: 25.00},
            {p: "BRS810", r: "LUIS MACHER", a: 30.00}, {p: "CHJ914", r: "LUIS MACHER", a: 30.00},
            {p: "CEU722", r: "KARINA VASQUEZ", a: 47.00}, {p: "CEU820", r: "LUIS MACHER", a: 30.00},
            {p: "CDS745", r: "KARINA VASQUEZ", a: 30.00}, {p: "EUG932", r: "ISABEL SOTOMAYOR", a: 50.00},
            {p: "EUJ542", r: "ISABEL SOTOMAYOR", a: 50.00}, {p: "EUJ551", r: "ISABEL SOTOMAYOR", a: 50.00},
            {p: "EUI752", r: "ISABEL SOTOMAYOR", a: 50.00}, {p: "EUC888", r: "CRISTIAN TESEN", a: 20.00},
            {p: "H3K913", r: "EDGARH SANTIESTEBAN", a: 20.00}, {p: "CLF333", r: "ALFREDO CHAN WAY", a: 42.00},
            {p: "CLF287", r: "PERCY MUENTE", a: 20.00}, {p: "BVD408", r: "PERCY MUENTE", a: 20.00},
            {p: "CLD318", r: "CASE VIP (GASOHOL)", a: 36.00}, {p: "CPH672", r: "CASE VIP (GASOHOL)", a: 36.00},
            {p: "CDL730", r: "CASE VIP", a: 76.00}, {p: "CBA760", r: "CASE VIP", a: 76.00},
            {p: "CDM720", r: "CASE VIP", a: 50.00}, {p: "C7Y818", r: "RAFAEL PITA", a: 40.00},
            {p: "ACI748", r: "OSCAR HERNANDEZ", a: 20.00}, {p: "AUA855", r: "CRISTIAN TESEN", a: 25.00},
            {p: "CFX846", r: "PAMELA GOMEZ", a: 30.00}
        ];

        let consumosGlobal = {};

        function renderTabla(datosConsumo = {}) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            let tAsig = 0, tCons = 0;

            CONFIG_FLOTA.forEach(item => {
                const consumido = datosConsumo[item.p] || 0;
                const saldo = item.a - consumido;
                const porc = (consumido / item.a) * 100;
                
                tAsig += item.a; tCons += consumido;

                cuerpo.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold text-blue-900">${item.p}</td>
                        <td class="p-4 text-xs font-medium text-gray-500">${item.r}</td>
                        <td class="p-4 text-center font-bold text-gray-400">${item.a.toFixed(2)}</td>
                        <td class="p-4 text-center font-bold text-orange-600">${consumido.toFixed(2)}</td>
                        <td class="p-4 text-center font-bold ${saldo < 0 ? 'text-red-600' : 'text-green-600'}">${saldo.toFixed(2)}</td>
                        <td class="p-4">
                            <div class="w-full bg-gray-200 rounded-full h-1.5 mb-1">
                                <div class="${porc > 90 ? 'bg-red-500' : 'bg-green-500'} h-1.5 rounded-full" style="width: ${Math.min(porc, 100)}%"></div>
                            </div>
                            <span class="text-[10px] font-bold uppercase ${porc > 90 ? 'text-red-500' : 'text-gray-400'}">${porc > 90 ? 'Límite Crítico' : 'Normal'}</span>
                        </td>
                    </tr>`;
            });

            document.getElementById('resumenAsignado').innerText = tAsig.toFixed(2) + " GLN";
            document.getElementById('resumenConsumido').innerText = tCons.toFixed(2) + " GLN";
            document.getElementById('resumenSaldo').innerText = (tAsig - tCons).toFixed(2) + " GLN";
            document.getElementById('resumenEficiencia').innerText = tAsig > 0 ? ((tCons / tAsig) * 100).toFixed(1) + "%" : "0%";
        }

        function leerExcel(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets['dat_comb']; // BUSCA EXACTAMENTE ESTA PESTAÑA
                if(!sheet) return alert("No se encontró la pestaña 'dat_comb'");
                
                const rows = XLSX.utils.sheet_to_json(sheet);
                const resumen = {};
                
                rows.forEach(row => {
                    const placa = row['Placa']; // Nombre exacto de tu columna en la captura
                    const cant = parseFloat(row['Ctd.en UM entrada']) || 0;
                    if(placa) resumen[placa] = (resumen[placa] || 0) + cant;
                });

                renderTabla(resumen);
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function filtrarTabla() {
            const query = document.getElementById('buscador').value.toUpperCase();
            const filas = document.getElementById('cuerpoTabla').getElementsByTagName('tr');
            for (let f of filas) {
                f.style.display = f.innerText.toUpperCase().includes(query) ? "" : "none";
            }
        }

        window.onload = () => renderTabla();
    </script>
</body>
</html>
