<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPORTE DE SALDOS - ACP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/saldo_comb.css">
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner"></div><div id="loaderText">Sincronizando...</div></div>

<div class="main-wrapper">
    <div class="sheet" id="captureArea">
        <div class="header-section">
            <img src="logo.png" alt="ACP" class="header-logo">
            <div class="title-block">REPORTE DE SALDOS</div>
            <div class="date-box">
                <span class="date-label">FECHA DE REPORTE</span>
                <input type="date" id="fechaReporte" onchange="guardarEnNube()">
            </div>
        </div>

        <div class="user-cards-section">
            <div class="user-card"><div class="user-card-header">DNI</div><div class="user-card-body"><input type="text" id="dniInput" class="readonly-field" readonly></div></div>
            <div class="user-card">
                <div class="user-card-header">OPERARIO</div>
                <div class="user-card-body">
                    <select id="operarioSelect" onchange="vincularDNI()">
                        <option value="">-- Seleccione --</option>
                        <option value="77103804">WILDER NEYRA PAICO</option>
                        <option value="76181486">LUIS ANGEL JUAREZ ELIAS</option>
                        <option value="74308732">CARLOS ORRILLO CRUZADO</option>
                        <option value="41892133">CRISTIAN GONZALES UCEDA</option>
                        <option value="76377901">ANGELO SALAZAR DEL AGUILA</option>
                        <option value="16454237">FELIPE FERNANDEZ TERRONES</option>
                    </select>
                </div>
            </div>
            <div class="user-card"><div class="user-card-header">TURNO</div><div class="user-card-body"><select id="turnoSelect" onchange="guardarEnNube()"><option value="DIA">DIA</option><option value="NOCHE">NOCHE</option></select></div></div>
        </div>

        <div class="fuel-table-wrapper">
            <table class="fuel-table">
                <thead><tr><th>PRODUCTO</th><th>V. FINAL</th><th>SALDO</th><th>ISOT.</th><th>TOT. GLS</th></tr></thead>
                <tbody>
                    <tr>
                        <td class="gasolina-label">GASOLINA</td>
                        <td><input type="number" id="vGasolina" step="0.1" min="0" oninput="calcularTotales()"></td>
                        <td id="sGasolina" class="readonly-field">0.00</td>
                        <td><input type="number" id="iGasolina" step="0.1" oninput="calcularTotales()"></td>
                        <td id="tGasolina" class="cell-total">0.00</td>
                    </tr>
                    <tr>
                        <td class="petroleo-label">PETROLEO</td>
                        <td><input type="number" id="vPetroleo" step="0.1" min="0" oninput="calcularTotales()"></td>
                        <td id="sPetroleo" class="readonly-field">0.00</td>
                        <td><input type="number" id="iPetroleo" step="0.1" oninput="calcularTotales()"></td>
                        <td id="tPetroleo" class="cell-total">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="sheet admin-search" id="seccionBuscador" style="display: none;">
        <div class="user-card-header">Buscador de historial (solo admin)</div>
        <div class="admin-search-inner">
            <div class="admin-field"><span class="date-label">Fecha a consultar</span><input type="date" id="fechaBusqueda"></div>
            <div class="admin-field"><span class="date-label">Turno</span><select id="turnoBusqueda"><option value="DIA">DIA</option><option value="NOCHE">NOCHE</option></select></div>
            <div class="admin-field" style="flex:0 0 auto"><button type="button" class="btn btn-guardar" onclick="consultarHistorial()">Buscar</button></div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-guardar" onclick="enviarReporteFinal()">ENVIAR REPORTE FINAL</button>
        <button id="btnImg" class="btn btn-descargar" onclick="descargarComoImagen()">DESCARGAR COMO IMAGEN</button>
        <button type="button" id="btnVolverDinamico" class="btn btn-home">Volver</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwExlJ_SGhr3EW2X0eHbRk5x_DVUykGExlNUgolQP3jUuS8G28a7EAePa0xu_FJIe-v9w/exec';
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    let timeoutSaldos;
    let isoGasOriginal = 0;
    let isoPetOriginal = 0;

    window.onload = () => {
        const rol = sessionStorage.getItem('rolGrifo');
        if (!sessionStorage.getItem('sessionGrifo')) { window.location.href = "index.html"; return; }
        if (rol === "ADMIN") document.getElementById('seccionBuscador').style.display = 'block';

        const btnVolver = document.getElementById('btnVolverDinamico');
        if (rol === "ADMIN") {
            btnVolver.innerHTML = "🏠 VOLVER AL DASHBOARD";
            btnVolver.onclick = () => { window.location.href = "index.html"; };
        } else {
            btnVolver.innerHTML = "🚛 VOLVER A FLOTA";
            btnVolver.onclick = () => { window.location.href = "consumo-flota.html"; };
        }
    };

    function showLoading(t) { loaderText.innerText = t || "Procesando..."; loader.style.display = 'flex'; }
    function hideLoading() { loader.style.display = 'none'; }

    document.addEventListener('DOMContentLoaded', async function() {
        showLoading("Sincronizando con la nube...");
        try {
            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            if (dataSist && dataSist.reservas) {
                isoGasOriginal = parseFloat(dataSist.reservas.gasohol) || 0;
                isoPetOriginal = parseFloat(dataSist.reservas.diesel) || 0;
            }

            const resBorrador = await fetch(`${scriptUrl}?action=getEstadoBorrador`);
            const borrador = await resBorrador.json();
            
            if (borrador && (borrador.vGas || borrador.vPet)) {
                if (borrador.fecha) document.getElementById('fechaReporte').value = borrador.fecha;
                document.getElementById('vGasolina').value = borrador.vGas || "";
                document.getElementById('vPetroleo').value = borrador.vPet || "";
                document.getElementById('turnoSelect').value = borrador.turno || "DIA";
                document.getElementById('iGasolina').value = borrador.iGas || isoGasOriginal;
                document.getElementById('iPetroleo').value = borrador.iPet || isoPetOriginal;
                if (borrador.dni) {
                    document.getElementById('operarioSelect').value = borrador.dni;
                    document.getElementById('dniInput').value = borrador.dni;
                }
            } else {
                const resFecha = await fetch(`${scriptUrl}?action=getUltimaFecha`);
                const dataFecha = await resFecha.json();
                if (dataFecha.fecha) document.getElementById('fechaReporte').value = dataFecha.fecha;
                document.getElementById('iGasolina').value = isoGasOriginal;
                document.getElementById('iPetroleo').value = isoPetOriginal;
            }
            await calcularTotales();
        } catch (e) { console.error("Error inicial:", e); } finally { hideLoading(); }
    });

    async function calcularTotales() {
        clearTimeout(timeoutSaldos);
        const vG = document.getElementById('vGasolina').value;
        const vP = document.getElementById('vPetroleo').value;
        const iG = document.getElementById('iGasolina').value;
        const iP = document.getElementById('iPetroleo').value;

        document.getElementById('sGasolina').innerText = "...";
        document.getElementById('sPetroleo').innerText = "...";

        timeoutSaldos = setTimeout(async () => {
            if (!vG && !vP) {
                document.getElementById('sGasolina').innerText = "0.00";
                document.getElementById('tGasolina').innerText = (parseFloat(iG) || 0).toFixed(2);
                document.getElementById('sPetroleo').innerText = "0.00";
                document.getElementById('tPetroleo').innerText = (parseFloat(iP) || 0).toFixed(2);
                guardarEnNube(); return;
            }
            showLoading("Sincronizando saldos...");
            try {
                await Promise.all([
                    actualizarSaldo('GASOLINA', vG, 'sGasolina', 'iGasolina', 'tGasolina'),
                    actualizarSaldo('PETROLEO', vP, 'sPetroleo', 'iPetroleo', 'tPetroleo')
                ]);
                guardarEnNube();
            } finally { hideLoading(); }
        }, 1000);
    }

    async function actualizarSaldo(tipo, valor, idS, idI, idT) {
        const iso = parseFloat(document.getElementById(idI).value) || 0;
        if (valor && valor >= 0) {
            try {
                const res = await fetch(`${scriptUrl}?action=getSaldoVarilla&tipo=${tipo}&valor=${valor}`);
                const data = await res.json();
                if (data.saldo !== undefined) {
                    const s = parseFloat(data.saldo);
                    document.getElementById(idS).innerText = s.toFixed(2);
                    document.getElementById(idT).innerText = (s + iso).toFixed(2);
                }
            } catch (e) { document.getElementById(idS).innerText = "Error"; }
        } else {
            document.getElementById(idS).innerText = "0.00";
            document.getElementById(idT).innerText = iso.toFixed(2);
        }
    }

    async function guardarEnNube() {
        const op = document.getElementById('operarioSelect');
        const data = {
            action: 'guardarEstadoBorrador',
            fecha: document.getElementById('fechaReporte').value,
            vGas: document.getElementById('vGasolina').value,
            vPet: document.getElementById('vPetroleo').value,
            iGas: document.getElementById('iGasolina').value,
            iPet: document.getElementById('iPetroleo').value,
            operario: op.selectedIndex > 0 ? op.options[op.selectedIndex].text : "",
            dni: op.value,
            turno: document.getElementById('turnoSelect').value
        };
        fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    async function enviarReporteFinal() {
    const op = document.getElementById('operarioSelect');
    if (!op.value) return alert("Selecciona operario.");

    const iG = parseFloat(document.getElementById('iGasolina').value) || 0;
    const iP = parseFloat(document.getElementById('iPetroleo').value) || 0;
    let msg = (iG !== isoGasOriginal || iP !== isoPetOriginal) ? "\n\n🚨 NOTA: Isotanques editados manualmente." : "";
    if (!confirm("¿Deseas registrar este reporte?" + msg)) return;

    showLoading("Generando imagen del reporte...");

    let imagenBase64 = "";
    try {
        const canvas = await html2canvas(document.getElementById('captureArea'), {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff"
        });
        imagenBase64 = canvas.toDataURL("image/png").split(",")[1];
    } catch (e) {
        hideLoading();
        alert("No se pudo generar la imagen del reporte.");
        return;
    }

    showLoading("Registrando y enviando correo...");

    const payload = {
        action: 'enviarReporteFinal',
        fechaReporte: document.getElementById('fechaReporte').value,
        dni: op.value,
        operario: op.options[op.selectedIndex].text,
        turno: document.getElementById('turnoSelect').value,
        vGas: document.getElementById('vGasolina').value,
        sGas: document.getElementById('sGasolina').innerText,
        iGas: iG,
        tGas: document.getElementById('tGasolina').innerText,
        vPet: document.getElementById('vPetroleo').value,
        sPet: document.getElementById('sPetroleo').innerText,
        iPet: iP,
        tPet: document.getElementById('tPetroleo').innerText,
        imagenReporteBase64: imagenBase64
    };

    try {
        await fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
        alert("✅ REPORTE GUARDADO Y ENVIADO.");
        location.reload();
    } catch (e) {
        alert("Error.");
    } finally {
        hideLoading();
    }
}

    async function consultarHistorial() {
        const f = document.getElementById('fechaBusqueda').value;
        const t = document.getElementById('turnoBusqueda').value;
        if (!f) return alert("¡Habla trome! Selecciona una fecha primero.");
        
        showLoading("Buscando en registros...");
        try {
            // 1. Traemos la data real del sistema (la que dice 6500)
            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            const stockRealGas = parseFloat(dataSist.reservas.gasohol) || 0;
            const stockRealPet = parseFloat(dataSist.reservas.diesel) || 0;

            // 2. Traemos el reporte que guardó el operario
            const resHist = await fetch(`${scriptUrl}?action=consultarHistorial&fecha=${f}&turno=${t}`);
            const r = await resHist.json();
            
            if (r.success) {
                const d = r.data;
                const gasHistorial = parseFloat(d.iGas) || 0;
                const petHistorial = parseFloat(d.iPet) || 0;

                let avisoAdmin = "";
                // COMPARACIÓN CRÍTICA: Historial vs Sistema Real
                if (gasHistorial !== stockRealGas || petHistorial !== stockRealPet) {
                    avisoAdmin = "\n\n🚨 ALERTA DE SEGURIDAD:\nLos Isotanques registrados NO coinciden con el stock real del sistema.";
                    avisoAdmin += `\n\nRegistrado: G:${gasHistorial} | P:${petHistorial}`;
                    avisoAdmin += `\nReal Sistema: G:${stockRealGas} | P:${stockRealPet}`;
                }

                alert(
                    `✅ REPORTE ENCONTRADO\n` +
                    `----------------------------\n` +
                    `Operario: ${d.operario}\n` +
                    `Turno: ${d.turno}\n` +
                    `Gasolina: Varilla ${d.vGas} | Saldo ${d.sGas} | Iso ${d.iGas}\n` +
                    `Petróleo: Varilla ${d.vPet} | Saldo ${d.sPet} | Iso ${d.iPet}\n` +
                    `----------------------------` + 
                    avisoAdmin
                );
            } else {
                alert("❌ " + r.message);
            }
        } catch (e) { 
            alert("Error al conectar con el servidor."); 
        } finally { 
            hideLoading(); 
        }
    }

    function vincularDNI() { 
        document.getElementById('dniInput').value = document.getElementById('operarioSelect').value; 
        guardarEnNube(); 
    }
    
async function descargarComoImagen() {
    const capture = document.getElementById('captureArea');
    if (!capture) {
        alert('No se encontró el área del reporte.');
        return;
    }

    if (typeof html2canvas !== 'function') {
        alert('No se cargó html2canvas. Revisa la conexión y recarga la página.');
        return;
    }

    const fechaInput = document.getElementById('fechaReporte');
    const fecha = (fechaInput && fechaInput.value)
        ? fechaInput.value
        : new Date().toISOString().slice(0, 10);

    showLoading('Generando imagen...');

    let exportHost = null;

    try {
        await document.fonts?.ready;

        // Clonar solo el bloque que quieres exportar
        const clone = capture.cloneNode(true);

        // Limpiar ids duplicados en el clon para evitar efectos raros
        clone.removeAttribute('id');

        // Contenedor offscreen
        exportHost = document.createElement('div');
        exportHost.id = 'exportHost';
        exportHost.style.position = 'fixed';
        exportHost.style.left = '-99999px';
        exportHost.style.top = '0';
        exportHost.style.width = '960px';
        exportHost.style.maxWidth = '960px';
        exportHost.style.padding = '0';
        exportHost.style.margin = '0';
        exportHost.style.background = '#ffffff';
        exportHost.style.zIndex = '-1';
        exportHost.style.pointerEvents = 'none';
        exportHost.style.opacity = '1';

        // Forzar estilos seguros para exportación
        clone.style.width = '960px';
        clone.style.maxWidth = '960px';
        clone.style.margin = '0';
        clone.style.background = '#ffffff';
        clone.style.overflow = 'visible';
        clone.style.boxShadow = 'none';

        // Quitar estilos conflictivos del tema moderno
        clone.querySelectorAll('*').forEach((el) => {
            el.style.animation = 'none';
            el.style.transition = 'none';
            el.style.backdropFilter = 'none';
            el.style.webkitBackdropFilter = 'none';
        });

        // Ajustes visuales seguros para html2canvas
        const headerSection = clone.querySelector('.header-section');
        if (headerSection) {
            headerSection.style.background = '#ffffff';
        }

        const titleBlock = clone.querySelector('.title-block');
        if (titleBlock) {
            titleBlock.style.background = '#0b7f57';
            titleBlock.style.color = '#ffffff';
            titleBlock.style.boxShadow = 'none';
        }

        clone.querySelectorAll('.gasolina-label').forEach((el) => {
            el.style.background = '#dc2626';
            el.style.color = '#ffffff';
        });

        clone.querySelectorAll('.petroleo-label').forEach((el) => {
            el.style.background = '#0b7f57';
            el.style.color = '#ffffff';
        });

        clone.querySelectorAll('.user-card-header').forEach((el) => {
            el.style.background = '#0b7f57';
            el.style.color = '#ffffff';
        });

        clone.querySelectorAll('.fuel-table-wrapper').forEach((el) => {
            el.style.overflow = 'visible';
            el.style.maxHeight = 'none';
            el.style.width = '100%';
        });

        clone.querySelectorAll('.fuel-table').forEach((el) => {
            el.style.width = '100%';
            el.style.minWidth = '0';
            el.style.maxWidth = '100%';
            el.style.tableLayout = 'fixed';
        });

        // Inputs con fondo limpio
        clone.querySelectorAll('input, select').forEach((el) => {
            el.style.background = '#ffffff';
            el.style.color = '#1f2937';
            el.style.border = '1px solid #d1d5db';
            el.style.boxShadow = 'none';
        });

        exportHost.appendChild(clone);
        document.body.appendChild(exportHost);

        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const canvas = await html2canvas(clone, {
            scale: Math.min(window.devicePixelRatio || 2, 3),
            useCORS: true,
            allowTaint: false,
            backgroundColor: '#ffffff',
            logging: false,
            width: clone.scrollWidth,
            height: clone.scrollHeight,
            scrollX: 0,
            scrollY: 0,
            windowWidth: 960,
            windowHeight: clone.scrollHeight
        });

        const link = document.createElement('a');
        link.download = `Reporte_Saldos_${fecha}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        document.body.appendChild(link);
        link.click();
        link.remove();

    } catch (e) {
        console.error('Error al generar imagen:', e);
        alert('No se pudo generar la imagen. Revisa la consola para ver el detalle.');
    } finally {
        if (exportHost && exportHost.parentNode) {
            exportHost.parentNode.removeChild(exportHost);
        }
        hideLoading();
    }
}
</script>
</body>
</html>
