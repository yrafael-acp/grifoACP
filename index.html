<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CORPORATIVO GRIFO ACP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #0f172a; --accent: #3b82f6; --diesel: #2563eb; 
            --gasohol: #10b981; --danger: #ef4444; --warning: #f59e0b; 
            --success: #22c55e; --bg: #f8fafc; --card-bg: #ffffff;
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; }

        #mainContent { display: none; max-width: 1400px; margin: auto; }
        .dashboard { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .full-width { grid-column: span 12; }
        .col-4 { grid-column: span 4; }
        .col-8 { grid-column: span 8; }

        .btn { cursor: pointer; padding: 12px; border: none; border-radius: 10px; font-weight: 700; color: white; transition: 0.2s; text-align: center; }
        .btn-blue { background: var(--accent); width: 100%; }
        .btn-green { background: var(--success); }
        .btn-logout { background: var(--danger); font-size: 0.8rem; padding: 8px 15px; }

        .header-main { background: var(--primary); color: white; padding: 20px 30px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .app-header-logo { height: 45px; filter: brightness(0) invert(1); margin-right: 15px; }

        .stock-item { padding: 20px; border-radius: 14px; text-align: center; color: white; }
        .stock-item.diesel { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .stock-item.gasohol { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
        .stock-label { font-size: 2rem; font-weight: 800; display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th { background: #f8fafc; padding: 15px; text-align: left; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .admin-only { display: none; }
        input, select { padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="Logo" style="height: 60px; margin-bottom: 20px;">
        <h2 id="loginTitle">Panel de Acceso</h2>
        <div id="loginForm">
            <input type="text" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="handleLogin()">Entrar</button>
        </div>
        <div id="changePassForm" style="display:none;">
            <p style="color: var(--danger); font-size: 0.85em;">Mínimo 1 Mayúscula y 1 Número.</p>
            <input type="password" id="newPassInput" placeholder="Nueva Contraseña">
            <input type="password" id="confirmPassInput" placeholder="Confirmar Contraseña">
            <button class="btn btn-green" style="width:100%" onclick="saveNewPassword()">Actualizar y Entrar</button>
        </div>
    </div>
</div>

<div id="mainContent">
    <header class="header-main">
        <div style="display: flex; align-items: center;">
            <img src="logo.png" alt="Logo ACP" class="app-header-logo">
            <div>
                <h1 style="margin:0; font-size: 1.2rem;">GRIFO ACP | <span id="displayUser"></span></h1>
                <small id="lastUpdate">Sincronizando...</small>
            </div>
        </div>
        <button onclick="logout()" class="btn btn-logout">Cerrar Sesión</button>
    </header>

    <div class="dashboard">
        <div class="card col-4 admin-only" id="registroCard">
            <h2>Registro</h2>
            <input type="date" id="fechaMov">
            <select id="tipoMov" onchange="toggleCisterna()"><option value="salida">Salida</option><option value="ingreso">Ingreso</option></select>
            <select id="prod"><option value="diesel">Diesel</option><option value="gasohol">Gasohol</option></select>
            <input type="number" id="cant" step="0.01" placeholder="Cantidad (gl)">
            <div id="extraData" style="display:none;"><input type="text" id="referencia" placeholder="Placa / Chofer"></div>
            <button class="btn btn-blue" onclick="procesarMovimiento()">Guardar</button>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn btn-green" style="flex:1" onclick="gestionarFiltros('compra', 'cf60')">+ CF60</button>
                <button class="btn btn-green" style="flex:1" onclick="gestionarFiltros('compra', 'cf100')">+ CF100</button>
            </div>
        </div>

        <div class="card col-8" id="monitorCard">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h2>Monitoreo</h2>
                <select id="selectAnioFiscal" style="width:auto" onchange="calcularConsumoAnual()">
                    <option value="2026" selected>Año 2026</option><option value="2025">Año 2025</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:15px 0;">
                <div class="stock-item diesel"><small>DIESEL</small><span id="sDiesel" class="stock-label">0.00</span></div>
                <div class="stock-item gasohol"><small>GASOHOL</small><span id="sGasohol" class="stock-label">0.00</span></div>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex:1; text-align:center; padding:10px; background:#f1f5f9; border-radius:10px;">
                    <small>TOTAL DIESEL</small><br><b id="annualDiesel" style="color:var(--diesel)">0.00</b>
                </div>
                <div style="flex:1; text-align:center; padding:10px; background:#f1f5f9; border-radius:10px;">
                    <small>TOTAL GASOHOL</small><br><b id="annualGasohol" style="color:var(--gasohol)">0.00</b>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <b>Consumo Mensual</b>
                <select id="filtroMesGrafico" onchange="procesarGrafico()" style="width:auto; margin:0; padding:5px;"></select>
            </div>
            <div style="height: 200px;"><canvas id="consumoChart"></canvas></div>
        </div>

        <div class="card full-width">
            <h2>Mantenimiento Preventivo</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Equipo</th><th>Filtro</th><th>Último</th><th>Días</th><th>Estado</th><th class="admin-only">Acción</th></tr></thead>
                    <tbody id="mantoBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card full-width">
            <h2>Historial de Movimientos</h2>
            <div class="table-container" style="max-height:300px;"><table id="tablaHistorialWeb"><thead><tr><th>Fecha</th><th>Mov</th><th>Prod</th><th>Cant</th><th>Ref</th><th>Saldo</th></tr></thead><tbody id="historialBody"></tbody></table></div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwxbsOPKzgjO5ERY4R40Vo84fo7PZtDg3DJMc5dwxIQua6SsHrrHFt0uvCF8jEOO0wdLA/exec'; 
const GENERIC_PASS = "GrifoACP2026";
const USERS = { "ADMIN": "ADMIN", "CVILLANUEVA": "ADMIN", "LJUAREZ": "READ", "CGONZALES": "READ", "CORRILLO": "READ", "FFERNANDEZ": "READ", "WNEYRA": "READ", "ASALAZAR": "READ" };

let currentUser = null, datosCache = [], miGrafico = null;

function handleLogin() {
    const user = document.getElementById('userInput').value.toUpperCase();
    const pass = document.getElementById('passInput').value;
    if (!USERS[user]) return alert("Usuario no válido.");
    const auth = JSON.parse(localStorage.getItem('userAuth_' + user)) || { pass: GENERIC_PASS };
    if (pass !== auth.pass) return alert("Contraseña incorrecta.");
    if (pass === GENERIC_PASS) { currentUser = user; document.getElementById('loginForm').style.display = 'none'; document.getElementById('changePassForm').style.display = 'block'; }
    else { startSession(user); }
}

function saveNewPassword() {
    const n1 = document.getElementById('newPassInput').value;
    if (!/^(?=.*[A-Z])(?=.*\d).+$/.test(n1)) return alert("Debe incluir Mayúscula y Número.");
    localStorage.setItem('userAuth_' + currentUser, JSON.stringify({ pass: n1, lastChange: new Date().toISOString() }));
    startSession(currentUser);
}

function startSession(user) {
    currentUser = user; sessionStorage.setItem('sessionGrifo', user);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('displayUser').innerText = user;
    if (USERS[user] === "ADMIN") document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    else { document.getElementById('registroCard').style.display = 'none'; document.getElementById('monitorCard').style.gridColumn = "span 12"; }
    cargarDatos();
}

async function cargarDatos() {
    try {
        const res = await fetch(`${WEB_APP_URL}?action=read`);
        const data = await res.json();
        data.filtros.cf60 = 3; data.filtros.cf100 = 2;
        if(data.equipos) data.equipos = data.equipos.map(e => { if(e.id.includes('Hipotanque')) e.ult = '2025-12-10'; return e; });
        datosCache = data.historial;
        actualizarUI(data);
        llenarSelectorMeses();
        calcularConsumoAnual();
        procesarGrafico();
        document.getElementById('lastUpdate').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
    } catch (e) { console.error("Error cargando datos"); }
}

function actualizarUI(data) {
    document.getElementById('sDiesel').innerText = data.stocks.diesel.toFixed(2);
    document.getElementById('sGasohol').innerText = data.stocks.gasohol.toFixed(2);
    document.getElementById('f60').innerText = data.filtros.cf60;
    document.getElementById('f100').innerText = data.filtros.cf100;
    const hoy = new Date();
    document.getElementById('mantoBody').innerHTML = data.equipos.map(e => {
        const fManto = parseFechaBase(e.ult);
        const diff = Math.floor((hoy - fManto) / (1000*60*60*24));
        const color = diff >= 90 ? 'bg-danger' : (diff >= 85 ? 'bg-warning' : 'bg-success');
        const btn = USERS[currentUser] === "ADMIN" ? `<button class="btn btn-blue" style="padding:5px 10px; width:auto" onclick="gestionarFiltros('reset', '', '${e.id}')">Reset</button>` : "-";
        return `<tr><td><b>${e.id}</b></td><td>${e.f}</td><td>${e.ult}</td><td>${diff} d</td><td><span class="status-badge ${color}">${diff>=90?'VENCIDO':'OK'}</span></td><td class="admin-only" style="display:${USERS[currentUser]==='ADMIN'?'table-cell':'none'}">${btn}</td></tr>`;
    }).join('');
    document.getElementById('historialBody').innerHTML = datosCache.map(x => `<tr><td>${x.fecha.replace('T',' ').substring(0,16)}</td><td><b>${x.mov}</b></td><td>${x.prod}</td><td>${x.cant}</td><td>${x.ref}</td><td><b>${x.saldo}</b></td></tr>`).join('');
}

function parseFechaBase(str) {
    if(!str) return null;
    const limpia = str.split('T')[0].split(',')[0].trim();
    const partes = limpia.split(/[/-]/);
    if(partes.length === 3) {
        if(partes[0].length === 4) return new Date(partes[0], partes[1]-1, partes[2]);
        return new Date(partes[2], partes[1]-1, partes[0]);
    }
    return new Date(str);
}

function calcularConsumoAnual() {
    const anio = parseInt(document.getElementById('selectAnioFiscal').value);
    let d = 0, g = 0;
    datosCache.forEach(h => {
        const f = parseFechaBase(h.fecha);
        if(f && f.getFullYear() === anio && h.mov.toUpperCase() === 'SALIDA') {
            if(h.prod.toUpperCase() === 'DIESEL') d += parseFloat(h.cant);
            else if(h.prod.toUpperCase() === 'GASOHOL') g += parseFloat(h.cant);
        }
    });
    document.getElementById('annualDiesel').innerText = d.toLocaleString('en-US') + " gl";
    document.getElementById('annualGasohol').innerText = g.toLocaleString('en-US') + " gl";
}

function llenarSelectorMeses() {
    const sel = document.getElementById('filtroMesGrafico');
    if (sel.options.length > 0) return;
    const meses = ["Septiembre 2025", "Octubre 2025", "Noviembre 2025", "Diciembre 2025", "Enero 2026", "Febrero 2026", "Marzo 2026"];
    meses.forEach(m => {
        let o = document.createElement('option'); o.value = m; o.innerText = m; sel.appendChild(o);
    });
    sel.value = "Marzo 2026";
}

function obtenerConsumoMes(lista, mesAnio) {
    let d = 0, g = 0;
    const mesBuscado = mesAnio.toLowerCase();
    lista.forEach(h => {
        const fecha = parseFechaBase(h.fecha);
        if(!fecha) return;
        const comp = fecha.toLocaleString('es-ES', { month: 'long', year: 'numeric' }).toLowerCase();
        if (comp === mesBuscado && h.mov.toUpperCase() === 'SALIDA') {
            if (h.prod.toUpperCase() === 'DIESEL') d += parseFloat(h.cant);
            if (h.prod.toUpperCase() === 'GASOHOL') g += parseFloat(h.cant);
        }
    });
    return { diesel: d, gasohol: g };
}

function procesarGrafico() {
    const sel = document.getElementById('filtroMesGrafico');
    if(!sel.value) return;
    const mesActual = sel.value;
    const dataActual = obtenerConsumoMes(datosCache, mesActual);
    const index = sel.selectedIndex;
    const dataPrev = index > 0 ? obtenerConsumoMes(datosCache, sel.options[index-1].value) : { diesel: 0, gasohol: 0 };

    const ctx = document.getElementById('consumoChart').getContext('2d');
    if (miGrafico) miGrafico.destroy();
    miGrafico = new Chart(ctx, {
        data: {
            labels: ['DIESEL', 'GASOHOL'],
            datasets: [
                { type: 'bar', label: mesActual, data: [dataActual.diesel, dataActual.gasohol], backgroundColor: ['#3b82f6', '#10b981'], borderRadius: 8 },
                { type: 'line', label: 'Mes Anterior', data: [dataPrev.diesel, dataPrev.gasohol], borderColor: '#f59e0b', tension: 0.1, fill: false }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

async function procesarMovimiento() {
    const p = { action: 'write', mov: document.getElementById('tipoMov').value.toUpperCase(), prod: document.getElementById('prod').value.toUpperCase(), cant: parseFloat(document.getElementById('cant').value), ref: document.getElementById('referencia').value || 'DESPACHO', fechaManual: document.getElementById('fechaMov').value || null };
    await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(p) });
    document.getElementById('cant').value = ""; cargarDatos();
}

function toggleCisterna() { document.getElementById('extraData').style.display = (document.getElementById('tipoMov').value === 'ingreso') ? 'block' : 'none'; }
async function gestionarFiltros(a, t, e) { await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'updateFiltros', subAction: a, tipo: t, equipo: e }) }); cargarDatos(); }
function logout() { sessionStorage.clear(); location.reload(); }
window.onload = () => { const s = sessionStorage.getItem('sessionGrifo'); if(s) startSession(s); };
</script>
</body>
</html>
