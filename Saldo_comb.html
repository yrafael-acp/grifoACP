<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REPORTE DE SALDOS - ACP</title>
    <style>
        :root {
            --acp-green: #007d32;
            --acp-light: #f1f5f9;
            --danger: #ef4444;
            --secondary: #64748b;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--acp-light); margin: 0; padding: 10px; }
        
        .main-wrapper { max-width: 900px; margin: auto; }
        .container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; overflow: hidden; }
        
        .header-section { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .header-logo { width: 120px; flex-shrink: 0; }
        .title-bg { background-color: var(--acp-green); color: white; font-size: 1.3rem; font-weight: bold; text-align: center; padding: 15px; flex: 1; border-radius: 4px; text-transform: uppercase; min-width: 200px; }
        
        .date-box { background: #f8fafc; border: 1px solid var(--acp-green); padding: 5px; border-radius: 4px; text-align: center; min-width: 140px; flex-shrink: 0; }
        .date-label { display: block; font-size: 0.7em; font-weight: bold; color: var(--acp-green); margin-bottom: 2px; }
        #fechaReporte { border: none; background: transparent; font-family: inherit; font-weight: bold; font-size: 0.9em; color: #333; cursor: pointer; text-align: center; width: 100%; outline: none; }

        .user-cards-section { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .user-card { flex: 1; min-width: calc(33.333% - 10px); background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; }
        .user-card-header { background-color: var(--acp-green); color: white; font-size: 0.85em; font-weight: bold; padding: 5px; text-align: center; text-transform: uppercase; }
        .user-card-body { padding: 10px; text-align: center; }
        
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1rem; }
        .readonly-field { background-color: #eee; font-weight: bold; color: #333; }

        .fuel-table-wrapper { width: 100%; overflow-x: auto; }
        table.fuel-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .fuel-table th, .fuel-table td { border: 1px solid #333; padding: 8px 4px; text-align: center; font-size: 0.85em; }
        .fuel-table th { background-color: var(--acp-green); color: white; text-transform: uppercase; }
        
        .gasolina-label { background-color: red; color: white; font-weight: bold; }
        .petroleo-label { background-color: var(--acp-green); color: white; font-weight: bold; }
        .cell-total { font-size: 1.1em; font-weight: bold; color: #333; }

        .button-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; flex: 1; min-width: 200px; }
        .btn-guardar { background-color: var(--acp-green); color: white; }
        .btn-descargar { background-color: var(--secondary); color: white; }

        /* --- NUEVOS ESTILOS PARA EL CARGADOR --- */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--acp-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 15px;
            font-family: sans-serif;
            font-weight: bold;
            color: var(--acp-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media screen and (max-width: 600px) {
            .header-section { flex-direction: column; }
            .user-card { min-width: 100%; }
        }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">Cargando datos...</div>
</div>

<div class="main-wrapper">
    <div class="container" id="captureArea">
        <div class="header-section">
            <img src="logo.png" alt="ACP" class="header-logo">
            <div class="title-bg">REPORTE DE SALDOS</div>
            <div class="date-box">
                <span class="date-label">FECHA DE REPORTE</span>
                <input type="date" id="fechaReporte">
            </div>
        </div>

        <div class="user-cards-section">
            <div class="user-card">
                <div class="user-card-header">DNI</div>
                <div class="user-card-body"><input type="text" id="dniInput" class="readonly-field" readonly></div>
            </div>
            <div class="user-card">
                <div class="user-card-header">OPERARIO</div>
                <div class="user-card-body">
                    <select id="operarioSelect" onchange="vincularDNI()">
                        <option value="">-- Seleccione --</option>
                        <option value="77103804">WILDER NEYRA PAICO</option>
                        <option value="76181486">LUIS ANGEL JUAREZ ELIAS</option>
                        <option value="74308732">CARLOS ORRILLO CRUZADO</option>
                        <option value="41892133">CRISTIAN GONZALES UCEDA</option>
                        <option value="76377901">ANGELO SALAZAR DEL AGUILA</option>
                        <option value="16454237">FELIPE FERNANDEZ TERRONES</option>
                    </select>
                </div>
            </div>
            <div class="user-card">
                <div class="user-card-header">TURNO</div>
                <div class="user-card-body">
                    <select id="turnoSelect" onchange="guardarEnNube()">
                        <option value="DIA">DIA</option>
                        <option value="NOCHE">NOCHE</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="fuel-table-wrapper">
            <table class="fuel-table">
                <thead>
                    <tr>
                        <th>PRODUCTO</th>
                        <th>V. FINAL</th>
                        <th>SALDO</th>
                        <th>ISOT.</th>
                        <th>TOT. GLS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="gasolina-label">GASOLINA</td>
                        <td><input type="number" id="vGasolina" step="0.1" oninput="calcularTotales()"></td>
                        <td id="sGasolina" class="readonly-field">0.00</td>
                        <td><input type="number" id="iGasolina" class="readonly-field" readonly></td>
                        <td id="tGasolina" class="cell-total">0.00</td>
                    </tr>
                    <tr>
                        <td class="petroleo-label">PETROLEO</td>
                        <td><input type="number" id="vPetroleo" step="0.1" oninput="calcularTotales()"></td>
                        <td id="sPetroleo" class="readonly-field">0.00</td>
                        <td><input type="number" id="iPetroleo" class="readonly-field" readonly></td>
                        <td id="tPetroleo" class="cell-total">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-guardar" onclick="enviarReporteFinal()">ENVIAR REPORTE FINAL</button>
        <button id="btnImg" class="btn btn-descargar" onclick="descargarComoImagen()">DESCARGAR COMO IMAGEN</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyznJML-_JIaxXzggVrViaMlw4J7N_MGCYeuPPRJ8xE29W4k-LxwGedRnasteqTvPmfFA/exec';
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');

    // --- BLOQUE DE SEGURIDAD Y REDIRECCIÓN ---
    window.onload = () => {
        const rol = sessionStorage.getItem('rolGrifo');
        const session = sessionStorage.getItem('sessionGrifo');

        // Si no hay sesión, al login de una
        if (!session) {
            window.location.href = "index.html";
            return;
        }

        // Si es OPERADOR (READ), blindamos el logo para que no vuelva a los tanques
        if (rol === "READ") {
            const logoLink = document.querySelector('.header-logo');
            if (logoLink) {
                // Si el logo fuera un <a> lo cambiamos, si es <img> le damos función
                logoLink.style.cursor = "pointer";
                logoLink.onclick = () => { window.location.href = "consumo-flota.html"; };
            }
        }
    };

    // Función para gestionar el estado visual de carga
    function showLoading(text) {
        loaderText.innerText = text || "Procesando...";
        loader.style.display = 'flex';
    }

    function hideLoading() {
        loader.style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', async function() {
        showLoading("Sincronizando con la nube...");
        try {
            // 1. Cargar fecha
            const resFecha = await fetch(`${scriptUrl}?action=getUltimaFecha`);
            const dataFecha = await resFecha.json();
            if (dataFecha.fecha) document.getElementById('fechaReporte').value = dataFecha.fecha;

            // 2. Cargar Isotanque
            const resSist = await fetch(`${scriptUrl}?action=read`);
            const dataSist = await resSist.json();
            if (dataSist.reservas) {
                document.getElementById('iGasolina').value = dataSist.reservas.gasohol || 0;
                document.getElementById('iPetroleo').value = dataSist.reservas.diesel || 0;
            }
            
            // 3. RECUPERAR EL BORRADOR DE LA NUBE
            const resBorrador = await fetch(`${scriptUrl}?action=getEstadoBorrador`);
            const borrador = await resBorrador.json();
            if (borrador) {
                document.getElementById('vGasolina').value = borrador.vGas || "";
                document.getElementById('vPetroleo').value = borrador.vPet || "";
                document.getElementById('operarioSelect').value = borrador.operario || "";
                document.getElementById('turnoSelect').value = borrador.turno || "DIA";
                vincularDNI(); // Actualiza el DNI visual
            }
            
            // 4. Calcular una vez cargado todo
            await calcularTotales();
        } catch (e) { 
            console.error("Error en carga inicial:", e); 
        } finally {
            hideLoading();
        }
    });

    async function calcularTotales() {
        const vGas = document.getElementById('vGasolina').value;
        const vPet = document.getElementById('vPetroleo').value;
        
        if(vGas || vPet) showLoading("Calculando saldos...");

        try {
            await Promise.all([
                actualizarSaldo('GASOLINA', vGas, 'sGasolina', 'iGasolina', 'tGasolina'),
                actualizarSaldo('PETROLEO', vPet, 'sPetroleo', 'iPetroleo', 'tPetroleo')
            ]);
            guardarEnNube(); 
        } finally {
            hideLoading();
        }
    }

    async function actualizarSaldo(tipo, valor, idSaldo, idIso, idTotal) {
        if (valor && valor >= 0) {
            try {
                const res = await fetch(`${scriptUrl}?action=getSaldoVarilla&tipo=${tipo}&valor=${valor}`);
                const data = await res.json();
                if (data.saldo !== undefined) {
                    const s = parseFloat(data.saldo);
                    document.getElementById(idSaldo).innerText = s.toFixed(2);
                    const iso = parseFloat(document.getElementById(idIso).value) || 0;
                    document.getElementById(idTotal).innerText = (s + iso).toFixed(2);
                }
            } catch (e) { console.error("Error saldo:", e); }
        } else {
            // Resetear si borran el valor
            document.getElementById(idSaldo).innerText = "0.00";
            const iso = parseFloat(document.getElementById(idIso).value) || 0;
            document.getElementById(idTotal).innerText = iso.toFixed(2);
        }
    }

    async function guardarEnNube() {
        const datos = {
            action: 'guardarEstadoBorrador',
            vGas: document.getElementById('vGasolina').value,
            vPet: document.getElementById('vPetroleo').value,
            operario: document.getElementById('operarioSelect').options[document.getElementById('operarioSelect').selectedIndex].text,
            dni: document.getElementById('operarioSelect').value,
            turno: document.getElementById('turnoSelect').value
        };
        // Enviamos sin esperar respuesta para no trabar la UI
        fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
    }

    function vincularDNI() {
        const select = document.getElementById('operarioSelect');
        document.getElementById('dniInput').value = select.value; // El value es el DNI
        guardarEnNube();
    }

    async function enviarReporteFinal() {
        if (!document.getElementById('operarioSelect').value) return alert("Selecciona un operario, trome.");
        
        const btn = document.querySelector('.btn-guardar');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;
        showLoading("Guardando reporte final...");
        
        // Aquí puedes añadir tu fetch de guardado final a la base de datos
        setTimeout(() => {
            alert("✅ Reporte final enviado con éxito.");
            btn.innerText = "ENVIAR REPORTE FINAL";
            btn.disabled = false;
            hideLoading();
        }, 1500);
    }

    function descargarComoImagen() {
        const area = document.getElementById('captureArea');
        const btnImg = document.getElementById('btnImg');
        btnImg.innerText = "GENERANDO...";
        showLoading("Generando imagen para WhatsApp...");

        html2canvas(area, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff",
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Saldo_ACP_${document.getElementById('fechaReporte').value}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btnImg.innerText = "DESCARGAR COMO IMAGEN";
            hideLoading();
        });
    }
    
    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
